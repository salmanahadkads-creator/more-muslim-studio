<!-- @dsCard group="Brand" viewport="760x280" name="Logo — Horizontal Lockup" subtitle="Standard size: 734 × 141 px" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-serif); }
  .row { display: flex; flex-direction: column; gap: 0; }
  .swatch { display: flex; align-items: center; justify-content: center; padding: 28px 0; }
  .swatch img { width: 734px; max-width: 92%; height: auto; }
  .meta { display: flex; justify-content: center; gap: 32px; padding: 10px 0 16px; background: var(--more-beige-soft); }
  .m { font-size: 11px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: color-mix(in srgb, var(--more-oak-brown) 55%, transparent); }
  .m b { color: var(--more-oak-brown); font-style: normal; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch" style="background: var(--more-night-blue);"><img src="../assets/logos/logo-horizontal-beige.svg" alt="More Muslim logo"></div>
    <div class="swatch" style="background: var(--more-beige-soft);"><img src="../assets/logos/logo-horizontal-oak.svg" alt="More Muslim logo"></div>
    <div class="meta">
      <span class="m">Standard size <b>734 × 141 px</b></span>
      <span class="m">Colourways: beige on dark &middot; oak on light</span>
    </div>
  </div>
</body>
</html>
