<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="11 → 96px, editorial steps" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-base); color: var(--text-primary); font-family: var(--font-serif); }
  .wrap { padding: 22px 28px; display: flex; flex-direction: column; gap: 6px; }
  .r { display: flex; align-items: baseline; gap: 16px; }
  .t { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tok { font-size: 11px; letter-spacing: .06em; color: var(--text-primary); width: 130px; flex: none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="r"><span class="tok">--text-5xl · 96</span><span class="t" style="font-size:60px;line-height:1">Aa</span></div>
    <div class="r"><span class="tok">--text-3xl · 52</span><span class="t" style="font-size:40px">Marist Display</span></div>
    <div class="r"><span class="tok">--text-2xl · 38</span><span class="t" style="font-size:30px">Episode Title</span></div>
    <div class="r"><span class="tok">--text-xl · 28</span><span class="t" style="font-size:24px">Section heading</span></div>
    <div class="r"><span class="tok">--text-lg · 22</span><span class="t" style="font-size:20px">Lead paragraph</span></div>
    <div class="r"><span class="tok">--text-base · 17</span><span class="t" style="font-size:17px">Body copy for reading</span></div>
    <div class="r"><span class="tok">--text-sm · 15</span><span class="t" style="font-size:15px;color:var(--text-primary)">Secondary detail</span></div>
    <div class="r"><span class="tok">--text-xs · 13</span><span class="t" style="font-size:13px;color:var(--text-primary)">Caption / footnote</span></div>
  </div>
</body>
</html>
