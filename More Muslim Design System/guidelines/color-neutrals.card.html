<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--more-beige-soft); }
  .row { display: flex; gap: 10px; padding: 18px; }
  .sw { flex: 1; height: 132px; border-radius: var(--radius-sm); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; font-family: var(--font-serif); }
  .name { font-size: 13px; letter-spacing: .02em; }
  .hex { font-size: 11px; letter-spacing: .08em; opacity: .7; text-transform: uppercase; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--more-white); color: var(--more-oak-brown); border: 1px solid var(--border-on-light);"><span class="name">White</span><span class="hex">#FFFFFF</span></div>
    <div class="sw" style="background: var(--more-beige-soft); color: var(--more-oak-brown); border: 1px solid var(--border-on-light);"><span class="name">Beige Soft</span><span class="hex">#FBF1E4</span></div>
    <div class="sw" style="background: var(--more-beige-deep); color: var(--more-oak-brown);"><span class="name">Beige Deep</span><span class="hex">#ECCFA9</span></div>
    <div class="sw" style="background: var(--more-black); color: var(--more-ivory-beige);"><span class="name">Black</span><span class="hex">#000000</span></div>
  </div>
</body>
</html>
