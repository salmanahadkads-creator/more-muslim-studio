<!-- @dsCard group="Type" viewport="700x250" name="Body & Italic Pull-Quote" subtitle="Regular for prose, Italic for quotes" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--more-beige-soft); color: var(--more-oak-brown); font-family: var(--font-serif); }
  .wrap { padding: 26px 28px; }
  .quote { font-style: italic; font-size: 26px; line-height: 1.18; max-width: 30ch; }
  .body { margin-top: 16px; font-size: 16px; line-height: 1.22; max-width: 56ch; color: color-mix(in srgb, var(--more-oak-brown) 80%, transparent); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="quote">“I want to let them know that there’s consequences of everything.”</div>
    <p class="body">More Muslim is the first narrative audio documentary series produced in Qatar, focused on stories from Muslim communities around the world.</p>
  </div>
</body>
</html>
