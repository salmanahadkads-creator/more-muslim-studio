function fmt(s) { s=Math.max(0,Math.floor(s||0)); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

function renderTemplate(tpl, way, format, scale, image, cropX, cropY, cropZoom, c) {
  const common = { scale, way, format, image, cropX, cropY, cropZoom };
  switch(tpl) {
    case 'cover':     return <S.CoverPost {...common} presents={c.presents} title={c.title} episode={c.episode} />;
    case 'quote':     return <S.QuotePost {...common} episode={c.episode} exchanges={[{speaker:c.s1,text:c.t1},{speaker:c.s2,text:c.t2}]} />;
    case 'synopsis':  return <S.SynopsisPost {...common} episode={c.episode} paragraphs={[c.p1,c.p2].filter(Boolean)} />;
    case 'streaming': return <S.NowStreamingPost {...common} episode={c.episode} lines={[c.l1,c.l2]} />;
    case 'credits':   return <S.CreditsPost {...common} episode={c.episode} body={c.body} />;
    default:          return null;
  }
}

function RichTextarea({ id, value, onChange, rows }) {
  const ref = React.useRef();
  React.useEffect(() => { if (ref.current) ref.current.innerHTML = value || ''; }, []);
  const emit = () => onChange(ref.current.innerHTML);
  const execCmd = (cmd) => { ref.current.focus(); document.execCommand(cmd, false, null); emit(); };
  return (
    <div className="richtextarea">
      <div className="rttoolbar">
        <button type="button" className="rtbtn" onMouseDown={e=>{e.preventDefault();execCmd('bold');}}><b>B</b></button>
        <button type="button" className="rtbtn" onMouseDown={e=>{e.preventDefault();execCmd('italic');}}><i>I</i></button>
      </div>
      <div ref={ref} id={id} className="txfield rtfield" contentEditable suppressContentEditableWarning onInput={emit} style={{minHeight:`${(rows||2)*1.5}em`}} />
    </div>
  );
}

async function exportCarouselFrames(carousel) {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:-1;pointer-events:none;';
  document.body.appendChild(container);
  const zip = new JSZip();
  for (let idx = 0; idx < carousel.length; idx++) {
    const item = carousel[idx];
    const sz = S.SIZES[item.format];
    const wrapper = document.createElement('div');
    wrapper.style.cssText = `width:${sz.w}px;height:${sz.h}px;overflow:hidden;flex:none;`;
    container.appendChild(wrapper);
    const root = ReactDOM.createRoot(wrapper);
    await new Promise(resolve => {
      root.render(renderTemplate(item.tpl, item.way, item.format, 1, item.image, item.cropX, item.cropY, item.cropZoom, item.content));
      setTimeout(resolve, 1400);
    });
    const canvas = await html2canvas(wrapper, { width:sz.w, height:sz.h, scale:1, useCORS:true, allowTaint:true, logging:false });
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    zip.file(`slide-${String(idx+1).padStart(2,'0')}.png`, blob);
    root.unmount();
    container.removeChild(wrapper);
  }
  document.body.removeChild(container);
  saveAs(await zip.generateAsync({type:'blob'}), 'more-muslim-carousel.zip');
}

function App() {
  const [tpl, setTpl]         = React.useState(_pf?.tpl    || "cover");
  const [way, setWay]         = React.useState(_pf?.way    || "night");
  const [format, setFormat]   = React.useState(_pf?.format || "portrait");

  const [cropX, setCropX]     = React.useState(50);
  const [cropY, setCropY]     = React.useState(50);
  const [cropZoom, setCropZoom] = React.useState(1);
  const [isDragging, setIsDragging] = React.useState(false);
  const [content, setContent] = React.useState(_pf?.content ? {...DEFAULTS, ..._pf.content} : DEFAULTS);
  const [customImage, setCustomImage] = React.useState(null);
  const dragRef    = React.useRef(null);
  const fileRef    = React.useRef();
  const [carousel, setCarousel]   = React.useState([]);
  const [exporting, setExporting] = React.useState(false);

  // Audiogram
  const [audioSrc, setAudioSrc]       = React.useState(null);
  const [audioT, setAudioT]           = React.useState(0);
  const [audioDur, setAudioDur]       = React.useState(0);
  const [audioPlaying, setAudioPlaying] = React.useState(false);
  const iframeRef    = React.useRef();
  const audioFileRef = React.useRef();
  const srtFileRef = React.useRef();

  const addToCarousel    = () => setCarousel(prev => [...prev, { id:Date.now(), tpl, way, format, content:{...content[tpl]}, image, cropX, cropY, cropZoom }]);
  const removeCarouselItem = (id) => setCarousel(prev => prev.filter(x => x.id !== id));
  const moveCarouselItem   = (id, dir) => setCarousel(prev => {
    const i=prev.findIndex(x=>x.id===id), j=i+dir;
    if (i<0||j<0||j>=prev.length) return prev;
    const next=[...prev]; [next[i],next[j]]=[next[j],next[i]]; return next;
  });
  const doExport = async () => { setExporting(true); try { await exportCarouselFrames(carousel); } finally { setExporting(false); } };

  const pick      = (k) => { setTpl(k); setWay(TEMPLATES[k].way); setFormat(TEMPLATES[k].format); };
  const pickImage = (src) => { setImage(src); setCropX(50); setCropY(50); setCropZoom(1); };
  const upd       = (field, val) => setContent(s => ({...s, [tpl]:{...s[tpl],[field]:val}}));

  const handleUpload = (e) => {
    const file=e.target.files[0]; if (!file) return;
    const url=URL.createObjectURL(file); setCustomImage(url); pickImage(url);
  };
  const handleAudioUpload = (e) => {
    const file=e.target.files[0]; if (!file) return;
    setAudioSrc(URL.createObjectURL(file));
  };
  const handleSrtUpload = async (e) => {
    const file=e.target.files[0]; if (!file) return;
    const text = await file.text();
    upd('srt', text);
  };

  const audiogramCmd = React.useCallback((type, extra={}) => {
    iframeRef.current?.contentWindow?.postMessage({type,...extra},'*');
  }, []);

  // Keep iframe in sync with config
  React.useEffect(() => {
    if (tpl !== 'audiogram') return;
    const ac = content.audiogram || {};
    const msg = {
      type:'audiogram-config', hostWay:way, guestWay:ac.guestWay||'oak',
      episodeEyebrow:ac.episodeEyebrow, outroEpisode:ac.outroEpisode,
      outroLine1:ac.outroLine1, outroLine2:ac.outroLine2,
      coverTitle:ac.coverTitle, coverEpisode:ac.coverEpisode,
      srt:ac.srt, audioSrc,
    };
    try { localStorage.setItem('mm-audiogram-cfg', JSON.stringify(msg)); } catch {}
    iframeRef.current?.contentWindow?.postMessage(msg, '*');
  }, [tpl, way, content.audiogram, audioSrc]);

  // Listen for time updates from iframe
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || e.data.type !== 'audiogram-time') return;
      setAudioT(e.data.t||0); setAudioDur(e.data.duration||0); setAudioPlaying(e.data.playing||false);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const size     = S.SIZES[format];
  const maxH     = Math.min(660, window.innerHeight - 200);
  const scale    = maxH / size.h;
  const displayW = size.w * scale;
  const displayH = size.h * scale;

  const handleMouseDown = (e) => {
    if (!image) return; e.preventDefault();
    dragRef.current = { startX:e.clientX, startY:e.clientY, cropX, cropY };
    setIsDragging(true);
  };

  const handleDoubleClick = (e) => {
    const overlay = e.currentTarget;
    overlay.style.pointerEvents = 'none';
    const el = document.elementFromPoint(e.clientX, e.clientY);
    if (!el) { overlay.style.pointerEvents=''; return; }
    const textEl = el.closest('[data-field]');
    if (!textEl) { overlay.style.pointerEvents=''; return; }
    const field = textEl.getAttribute('data-field');
    if (!field||field==='url') { overlay.style.pointerEvents=''; return; }
    textEl.contentEditable='true';
    textEl.style.outline='2px solid rgba(226,177,109,0.6)';
    textEl.style.outlineOffset='6px'; textEl.style.borderRadius='2px'; textEl.style.minWidth='1em';
    if (document.caretRangeFromPoint) { const range=document.caretRangeFromPoint(e.clientX,e.clientY); if(range){const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);} } else { textEl.focus(); }
    const done = () => {
      const newText=textEl.innerHTML;
      textEl.contentEditable='false'; textEl.style.outline=''; textEl.style.outlineOffset=''; textEl.style.borderRadius=''; textEl.style.minWidth='';
      overlay.style.pointerEvents='';
      textEl.removeEventListener('blur', done); textEl.removeEventListener('keydown', onKey);
      upd(field, newText);
    };
    const onKey=(ev)=>{ if(ev.key==='Escape') textEl.blur(); if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();textEl.blur();} };
    textEl.addEventListener('blur', done); textEl.addEventListener('keydown', onKey);
  };

  React.useEffect(() => {
    if (!isDragging) return;
    const onMove = (e) => {
      const d=dragRef.current; if (!d) return;
      const dx=e.clientX-d.startX, dy=e.clientY-d.startY, sens=1/cropZoom;
      setCropX(Math.max(0,Math.min(100,d.cropX-(dx/displayW*100)*sens)));
      setCropY(Math.max(0,Math.min(100,d.cropY-(dy/displayH*100)*sens)));
    };
    const onUp = () => { setIsDragging(false); dragRef.current=null; };
    window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, [isDragging, displayW, displayH, cropZoom]);

  const c = content[tpl];
  const isAudiogram = tpl === 'audiogram';

  const openForRecording = () => {
    const ac=content.audiogram||{};
    try { localStorage.setItem('mm-audiogram-cfg', JSON.stringify({ hostWay:way, guestWay:ac.guestWay||'oak', episodeEyebrow:ac.episodeEyebrow, outroEpisode:ac.outroEpisode, outroLine1:ac.outroLine1, outroLine2:ac.outroLine2, coverTitle:ac.coverTitle, coverEpisode:ac.coverEpisode, srt:ac.srt, audioSrc })); } catch {}
    window.open('audiogram-player.html','_blank');
  };

  return (
    <React.Fragment>
      <Mount el="illus-label">{isAudiogram ? 'Audio & Background' : 'Illustration'}</Mount>
      <Mount el="carousel-label">{isAudiogram ? 'Export' : 'Carousel'}</Mount>
      <Mount el="tlist">
        {ORDER.map(k => (
          <button key={k} className={"titem"+(k===tpl?" on":"")} onClick={()=>pick(k)}>{TEMPLATES[k].label}</button>
        ))}
      </Mount>
      <Mount el="swatches">
        {isAudiogram && <div className="sway-label">Host</div>}
        {Object.keys(S.WAYS).map(w => (
          <button key={w} className={"sw"+(w===way?" on":"")} title={w} style={{background:S.WAYS[w].bg}} onClick={()=>setWay(w)} />
        ))}
        {isAudiogram && (
          <React.Fragment>
            <div className="sway-label" style={{marginTop:8}}>Guest</div>
            {Object.keys(S.WAYS).map(w => (
              <button key={'g-'+w} className={"sw"+(w===(content.audiogram?.guestWay||'oak')?" on":"")} title={w}
                style={{background:S.WAYS[w].bg}} onClick={()=>upd('guestWay',w)} />
            ))}
          </React.Fragment>
        )}
      </Mount>
      <Mount el="formats">
        {isAudiogram
          ? <span style={{fontSize:12,letterSpacing:'0.1em',color:'rgba(246,225,198,0.35)'}}>9:16 STORY</span>
          : FORMATS.map(([f,lbl]) => <button key={f} className={f===format?"on":""} onClick={()=>setFormat(f)}>{lbl}</button>)
        }
      </Mount>
      <Mount el="imgpick">
        {isAudiogram ? (
          <React.Fragment>
            <input type="file" id="audioupload" ref={audioFileRef} accept="audio/*" onChange={handleAudioUpload} />
            <label htmlFor="audioupload" className={"uploadbtn"+(audioSrc?" on":"")}>
              {audioSrc ? '✓ Audio loaded' : '+ Upload audio (.mp3, .m4a)'}
            </label>
            <input type="file" id="srtupload" ref={srtFileRef} accept=".srt,.txt" onChange={handleSrtUpload} />
            <label htmlFor="srtupload" className={"uploadbtn"+(content.audiogram?.srt && content.audiogram.srt !== AUDIOGRAM_SRT ? ' on' : '')}>
              {content.audiogram?.srt && content.audiogram.srt !== AUDIOGRAM_SRT ? '✓ Captions loaded' : '+ Upload captions (SRT)'}
            </label>
            {audioSrc && (
              <button className="nonebtn" onClick={()=>setAudioSrc(null)} style={{gridColumn:'span 3',marginTop:4}}>Remove audio</button>
            )}
            <span className="croplabel" style={{gridColumn:'span 3',marginTop:10,marginBottom:4}}>Background illustration</span>
            <button className={"nonebtn"+((!['cover','therapy'].includes(way))?' on':'')}
              onClick={()=>{ if(['cover','therapy'].includes(way)) setWay('beige'); }}
              style={{gridColumn:'span 1'}}>None</button>
            {AUDIOGRAM_BG_IMGS.map(img => (
              <img key={img.key} src={img.src} alt={img.name} title={img.name}
                className={"imgthumb"+(way===img.key?' on':'')} onClick={()=>setWay(img.key)} />
            ))}
          </React.Fragment>
        ) : (
          <React.Fragment>
            <button className={"nonebtn"+(!image?" on":"")} onClick={()=>setImage(null)}>No illustration</button>
            {IMAGES.map(img => (
              <img key={img.src} src={img.src} alt={img.label} title={img.label}
                className={"imgthumb"+(image===img.src?" on":"")} onClick={()=>pickImage(img.src)} />
            ))}
            {customImage && (
              <img src={customImage} alt="Custom" title="Custom image"
                className={"imgthumb"+(image===customImage?" on":"")} onClick={()=>pickImage(customImage)} />
            )}
            <input type="file" id="imgupload" ref={fileRef} accept="image/*" onChange={handleUpload} />
            <label htmlFor="imgupload" className={"uploadbtn"+(image&&image===customImage?" on":"")}>+ Upload image</label>
          </React.Fragment>
        )}
      </Mount>
      <Mount el="cropsliders">
        {!isAudiogram && image && (
          <React.Fragment>
            <span className="croplabel" style={{color:'rgba(246,225,198,0.3)',display:'block',marginBottom:4}}>Drag image to pan</span>
            <span className="croplabel">Zoom</span>
            <input type="range" className="cropslider" min="1" max="3" step="0.05" value={cropZoom} onChange={e=>setCropZoom(Number(e.target.value))} />
            <span className="croplabel">Horizontal</span>
            <input type="range" className="cropslider" min="0" max="100" value={cropX} onChange={e=>setCropX(Number(e.target.value))} />
            <span className="croplabel">Vertical</span>
            <input type="range" className="cropslider" min="0" max="100" value={cropY} onChange={e=>setCropY(Number(e.target.value))} />
          </React.Fragment>
        )}
      </Mount>
      <Mount el="textedit">
        {(FIELDS[tpl]||[]).map((f,i) => (
          <React.Fragment key={f.id}>
            <span className="txlabel" style={{marginTop:i===0?0:10}}>{f.label}</span>
            {f.type==='textarea' && f.richtext
              ? <RichTextarea id={"txf-"+f.id} value={c[f.id]} rows={f.rows||2} onChange={v=>upd(f.id,v)} />
              : f.type==='textarea'
              ? <textarea id={"txf-"+f.id} className="txfield" rows={f.rows||2} value={c[f.id]||''} onChange={e=>upd(f.id,e.target.value)} />
              : <input    id={"txf-"+f.id} className="txfield" value={c[f.id]||''} onChange={e=>upd(f.id,e.target.value)} />
            }
          </React.Fragment>
        ))}
      </Mount>
      <Mount el="preview">
        {isAudiogram ? (
          <iframe ref={iframeRef} src="audiogram-player.html"
            style={{width:displayW, height:displayH, border:'none', display:'block'}}
            onLoad={() => {
              const ac=content.audiogram||{};
              setTimeout(()=>{ iframeRef.current?.contentWindow?.postMessage({ type:'audiogram-config', hostWay:way, guestWay:ac.guestWay||'oak', episodeEyebrow:ac.episodeEyebrow, outroEpisode:ac.outroEpisode, outroLine1:ac.outroLine1, outroLine2:ac.outroLine2, coverTitle:ac.coverTitle, coverEpisode:ac.coverEpisode, srt:ac.srt, audioSrc }, '*'); }, 300);
            }}
          />
        ) : (
          <React.Fragment>
            <div onMouseDown={handleMouseDown} onDoubleClick={handleDoubleClick}
              style={{position:'absolute',inset:0,zIndex:10,cursor:isDragging?'grabbing':image?'grab':'default',userSelect:'none'}} />
            {renderTemplate(tpl, way, format, scale, image, cropX, cropY, cropZoom, c)}
          </React.Fragment>
        )}
      </Mount>
      <Mount el="audiogram-transport">
        {isAudiogram && (
          <React.Fragment>
            <button className="atbtn" onClick={()=>audiogramCmd(audioPlaying?'audiogram-pause':'audiogram-play')}>
              {audioPlaying ? '❚❚ Pause' : '▶ Play'}
            </button>
            <button className="atbtn" onClick={()=>audiogramCmd('audiogram-restart')}>↺</button>
            <input type="range" min={0} max={audioDur||1} step={0.01} value={audioT}
              onChange={e=>audiogramCmd('audiogram-seek',{time:+e.target.value})}
              style={{flex:1,accentColor:'#9FBCCC',cursor:'pointer'}} />
            <span style={{fontVariantNumeric:'tabular-nums',minWidth:80,textAlign:'right'}}>
              {fmt(audioT)} / {fmt(audioDur)}
            </span>
          </React.Fragment>
        )}
      </Mount>
      <Mount el="carousel">
        {isAudiogram ? (
          <React.Fragment>
            <p className="hint" style={{marginBottom:12}}>
              Play the audiogram in the preview, then screen-record. Open fullscreen for best capture quality.
            </p>
            <button className="export-btn" onClick={openForRecording}>Open for recording ↗</button>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div className="carousel-list">
              {carousel.map((item,i) => (
                <div key={item.id} className="carousel-item">
                  <div className="carousel-swatch" style={{width:28,height:item.format==='story'?50:35,background:S.WAYS[item.way].bg,color:S.WAYS[item.way].accent}}>
                    {item.format==='story'?'9:16':'4:5'}
                  </div>
                  <div className="carousel-meta">
                    <div className="carousel-meta-tpl">{TEMPLATES[item.tpl].label}</div>
                    <div className="carousel-meta-sub">{item.way}</div>
                  </div>
                  <div className="carousel-actions">
                    <button className="carousel-btn" onClick={()=>moveCarouselItem(item.id,-1)} disabled={i===0}>↑</button>
                    <button className="carousel-btn" onClick={()=>moveCarouselItem(item.id,1)} disabled={i===carousel.length-1}>↓</button>
                    <button className="carousel-btn" onClick={()=>removeCarouselItem(item.id)}>×</button>
                  </div>
                </div>
              ))}
            </div>
            <button className="carousel-add" onClick={addToCarousel}>+ Add current frame</button>
            {carousel.length > 0 && (
              <button className="export-btn" onClick={doExport} disabled={exporting}>
                {exporting ? 'Exporting\u2026' : `\u2b07 Export ${carousel.length} frame${carousel.length>1?'s':''} as PNG`}
              </button>
            )}
          </React.Fragment>
        )}
      </Mount>
      <Mount el="metaline">{TEMPLATES[tpl].label} · {way} · {size.w}×{size.h}</Mount>
    </React.Fragment>
  );
}

function Mount({ el, children }) {
  const node = document.getElementById(el);
  return node ? ReactDOM.createPortal(children, node) : null;
}

const host = document.createElement("div");
document.body.appendChild(host);
ReactDOM.createRoot(host).render(<App />);
</script>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
    <rect width="120" height="80" fill="#192136"/>
    <rect x="38" y="12" width="28" height="35" rx="2" fill="#E2B16D" opacity="0.9"/>
    <rect x="70" y="20" width="18" height="27" rx="2" fill="#E2B16D" opacity="0.5"/>
    <rect x="26" y="52" width="68" height="4" rx="2" fill="#F6E1C6" opacity="0.3"/>
    <rect x="36" y="60" width="48" height="3" rx="1.5" fill="#F6E1C6" opacity="0.15"/>
  </svg>
</template>

</body>
