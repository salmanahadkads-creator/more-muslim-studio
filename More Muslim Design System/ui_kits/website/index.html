<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>More Muslim</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--more-beige-soft); color: var(--more-oak-brown); font-family: var(--font-serif); }
  a { color: inherit; text-decoration: none; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
const { Header, Home, EpisodePage, About } = window.MMSite;
function App() {
  const [route, setRoute] = React.useState({ name: "home" });
  const home = () => { setRoute({ name: "home" }); window.scrollTo(0, 0); };
  const about = () => { setRoute({ name: "about" }); window.scrollTo(0, 0); };
  const open = (id) => { setRoute({ name: "episode", id }); window.scrollTo(0, 0); };
  return (
    <React.Fragment>
      <Header onHome={home} onAbout={about} route={route.name} />
      {route.name === "home" && <Home onOpen={open} onAbout={about} />}
      {route.name === "episode" && <EpisodePage id={route.id} onOpen={open} onHome={home} />}
      {route.name === "about" && <About onHome={home} />}
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
