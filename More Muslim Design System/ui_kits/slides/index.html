<!-- @dsCard group="Slides" viewport="1280x720" name="Keynote Deck" subtitle="Imagining New Muslim Narratives in Media" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>More Muslim — Keynote</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: #0c1019; display: flex; align-items: center; justify-content: center; overflow: hidden; font-family: var(--font-serif); }
  #stage { position: relative; }
  .nav { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 16px; z-index: 20;
    background: rgba(25,33,54,0.7); border: 1px solid var(--border-subtle); border-radius: 999px; padding: 8px 14px; backdrop-filter: blur(8px); }
  .nav button { background: none; border: none; color: var(--more-ivory-beige); cursor: pointer; font-family: var(--font-serif); font-size: 18px; padding: 4px 8px; opacity: 0.8; }
  .nav button:hover { opacity: 1; }
  .nav .count { color: var(--more-ivory-beige); font-size: 13px; letter-spacing: 0.14em; opacity: 0.7; min-width: 54px; text-align: center; }
</style>
</head>
<body>
<div id="stage"></div>
<div class="nav"><button id="prev">←</button><span class="count" id="count"></span><button id="next">→</button></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
const S = window.MMSlides;
const KEY = "mm-keynote-slide";
function Deck() {
  const [i, setI] = React.useState(() => { const v = parseInt(localStorage.getItem(KEY)); return isNaN(v) ? 0 : Math.min(v, S.DECK.length - 1); });
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => { localStorage.setItem(KEY, i); }, [i]);
  const go = React.useCallback((d) => setI((p) => Math.max(0, Math.min(S.DECK.length - 1, p + d))), []);
  React.useEffect(() => {
    const fit = () => setScale(Math.min(window.innerWidth / S.W, window.innerHeight / S.H) * 0.92);
    fit(); window.addEventListener("resize", fit);
    const key = (e) => { if (e.key === "ArrowRight") go(1); if (e.key === "ArrowLeft") go(-1); };
    window.addEventListener("keydown", key);
    document.getElementById("prev").onclick = () => go(-1);
    document.getElementById("next").onclick = () => go(1);
    return () => { window.removeEventListener("resize", fit); window.removeEventListener("keydown", key); };
  }, [go]);
  React.useEffect(() => { document.getElementById("count").textContent = `${String(i + 1).padStart(2, "0")} / ${String(S.DECK.length).padStart(2, "0")}`; }, [i]);
  return (
    <div style={{ width: S.W * scale, height: S.H * scale }}>
      <div style={{ width: S.W, height: S.H, transform: `scale(${scale})`, transformOrigin: "top left", boxShadow: "0 30px 80px rgba(0,0,0,0.5)" }}>
        {S.DECK[i]()}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("stage")).render(<Deck />);
</script>
</body>
</html>
