<!-- @dsCard group="Colors" viewport="700x200" name="Cool Blue" subtitle="Mist → coastal → stone → night" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--more-beige-soft); }
  .row { display: flex; gap: 10px; padding: 18px; }
  .sw { flex: 1; height: 132px; border-radius: var(--radius-sm); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; font-family: var(--font-serif); color: var(--more-ivory-beige); }
  .sw.l { color: var(--more-night-blue); }
  .name { font-size: 13px; letter-spacing: .02em; }
  .hex { font-size: 11px; letter-spacing: .08em; opacity: .75; text-transform: uppercase; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw l" style="background: var(--more-mist-blue);"><span class="name">Mist Blue</span><span class="hex">#9FBCCC</span></div>
    <div class="sw" style="background: var(--more-coastal-blue);"><span class="name">Coastal Blue</span><span class="hex">#6185A3</span></div>
    <div class="sw" style="background: var(--more-stone-blue);"><span class="name">Stone Blue</span><span class="hex">#3C5065</span></div>
    <div class="sw" style="background: var(--more-night-blue);"><span class="name">Night Blue</span><span class="hex">#192136</span></div>
  </div>
</body>
</html>
