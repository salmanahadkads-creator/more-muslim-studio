      const op = motion === 'fade' ? Math.min(1, Math.max(0, (t - w.start) / 0.18)) : (t >= w.start ? 1 : 0);
      if (op <= 0) return;
      const ty = motion === 'fade' ? (1 - op) * 10 : 0;
      spans.push(h('span', { key: i, style: { display: 'inline-block', opacity: op, transform: `translateY(${ty}px)`, marginRight: '0.28em' } }, w.text));
    });
    const label = this.pick('showSpeakerLabel')
      ? h('div', { style: { fontSize: 32, textTransform: 'uppercase', letterSpacing: '0.165em', marginBottom: 28, color: labelColor || ink } }, this.firstName(active.speaker))
      : null;
    return h('div', { style: { color: ink } }, label, h('div', { style: { fontSize: size, lineHeight: 1.06, maxWidth: 780 } }, spans));
  }

  buildCover() {
    if (this.state.started) return null;
    const h = React.createElement;
    const way = this.pick('coverWay'); const w = this.ways[way]; const ink = w.ink;
    const tpl = this.pick('coverTemplate');
    const symSrc = `../../assets/logos/symbol-${w.logo}.svg`;
    const eb = (txt) => h('div', { style: { fontSize: 32, textTransform: 'uppercase', letterSpacing: '0.165em', color: ink } }, txt);
    let content = null;
    if (tpl === 'cover') {
      content = h('div', { style: { position: 'relative', height: '100%', display: 'flex', flexDirection: 'column', padding: '150px 85px 300px', color: ink } },
        h('div', { style: { textAlign: 'center' } }, eb(this.pick('coverEyebrow'))),
        h('h1', { style: { margin: '40px auto 0', textAlign: 'center', fontWeight: 400, textTransform: 'uppercase', letterSpacing: '0.165em', fontSize: 77, lineHeight: 1.06, maxWidth: 820 } }, this.pick('coverTitle')),
        h('div', { style: { marginTop: 'auto', display: 'flex', alignItems: 'center' } },
          h('img', { src: symSrc, alt: '', style: { width: 180, height: 180, flex: 'none' } }),
          h('div', { style: { flex: 1, textAlign: 'center', fontSize: 32, textTransform: 'uppercase', letterSpacing: '0.165em', color: ink } }, this.pick('coverEpisode')),
          h('div', { style: { width: 180, flex: 'none' } })
        )
      );
    } else if (tpl === 'synopsis') {
      content = h('div', { style: { position: 'relative', height: '100%', display: 'flex', flexDirection: 'column', padding: '150px 85px 300px', color: ink } },
        h('div', { style: { textAlign: 'center', marginBottom: 64 } }, eb(this.pick('coverEpisode'))),
        h('div', { style: { flex: 1, display: 'flex', alignItems: 'center' } }, h('p', { style: { margin: 0, fontSize: 56, lineHeight: 1.05, maxWidth: 780, textWrap: 'pretty' } }, this.pick('coverBody'))),
        h('div', { style: { textAlign: 'center', fontSize: 32, textTransform: 'uppercase', letterSpacing: '0.165em' } }, 'MOREMUSLIM.ORG')
      );
    }
    return h('div', { style: { position: 'absolute', inset: 0 } }, h('div', { style: { position: 'absolute', inset: 0 } }, this.groundLayer(way, 1, 'cover')), content);
  }

  outroStart() {
    const dur = this.state.duration || 0;
    if (!dur) return Infinity;
    return Math.max((this.contentEnd || 0) + 0.3, dur - this.pick('outroDuration'));
  }

  fmt(s) {
    s = Math.max(0, Math.floor(s || 0));
    const m = Math.floor(s / 60); const ss = String(s % 60).padStart(2, '0');
    return `${m}:${ss}`;
  }

  renderVals() {
    this.ensureParsed();
    const h = React.createElement;
    const s = this.state.scale; const t = this.state.t;

    const hostWay = this.pick('hostWay');
    const guestWay = this.pick('guestWay');
    const active = this.activeBlock();
    const inkColor = (this.ways[hostWay] || this.ways.beige).ink;
    const guestActive = active && this.guest && active.speaker === this.guest;
    const labelColor = guestActive ? (this.ways[guestWay] || this.ways.oak).bg : inkColor;

    const groundEl = h('div', { style: { position: 'absolute', inset: 0 } }, this.groundLayer(hostWay, 1, 'host'));

    // outro
    const os = this.outroStart();
    const oProg = isFinite(os) ? Math.min(1, Math.max(0, (t - os) / 0.6)) : 0;
    let outroWay = this.pick('outroWay');
    if (outroWay === 'carry') {
      const lb = this.blocks && this.blocks[this.blocks.length - 1];
      outroWay = (lb && this.guest && lb.speaker === this.guest) ? guestWay : hostWay;
    }
    const ow = this.ways[outroWay] || this.ways.night;
    const outroGround = h('div', { style: { position: 'absolute', inset: 0 } }, this.groundLayer(outroWay, 1, 'outroG'));

    const dur = this.state.duration || ((this.contentEnd || 0) + this.pick('outroDuration')) || 1;

    // Live values routed through CSS custom properties (set imperatively via rootRef)
    // so every template style stays literal and paints immediately.
    this._vars = {
      s: s,
      ink: inkColor,
      chromeOp: 1 - oProg,
      outroOp: oProg,
      outroPe: oProg > 0.5 ? 'auto' : 'none',
      outroInk: ow.ink,
    };
    this._applyVars();

    return {
      rootRef: this.rootRef,
      groundEl,
      captionEl: this.buildCaption(inkColor, labelColor),
      coverEl: this.buildCover(),
      episodeEyebrow: this.pick('episodeEyebrow'),
      showGuides: !!this.pick('safeGuides'),
      outroGround,
      outroEpisode: this.pick('outroEpisode'),
      outroLine1: this.pick('outroLine1'),
      outroLine2: this.pick('outroLine2'),
      outroSymbolSrc: `../../assets/logos/symbol-${ow.logo}.svg`,
      // controls
      togglePlay: this.togglePlay,
      restart: this.restart,
      seek: this.seek,
      audioRef: this.audioRef,
      duration: dur,
      t: t,
      playLabel: this.state.playing ? '❚❚ Pause' : '▶ Play',
      timeLabel: `${this.fmt(t)} / ${this.fmt(dur)}`,
    };
  }
}
</script>
</body>
</html>
