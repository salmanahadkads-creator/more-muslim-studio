<!-- @dsCard group="Slides" viewport="1280x720" name="Episode List Slide" subtitle="Keynote · Episode List" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>html,body{margin:0}body{width:1280px;height:720px;overflow:hidden}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"patternOpacity":0.2,"ground":"beige"}/*EDITMODE-END*/;
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const S = window.MMSlides;
  return (<>
    <S.ListSlide g={t.ground} patternOpacity={t.patternOpacity}
      eyebrow="Season One · selected episodes"
      items={[
        { n: "E1", title: "Side Entrances", dur: "44 min" },
        { n: "E3", title: "The Secret Translators", dur: "44 min" },
        { n: "E6", title: "Cape Malay", dur: "42 min" },
        { n: "E7", title: "In Therapy, With SheikhaGPT", dur: "42 min" },
        { n: "E9", title: "A More Muslim Japan", dur: "26 min" },
      ]} />
    <TweaksPanel>
      <TweakSection label="Background" />
      <TweakSlider label="Pattern opacity" value={t.patternOpacity} min={0} max={1} step={0.05} onChange={v => setTweak('patternOpacity', v)} />
      <TweakRadio label="Ground" value={t.ground} options={['beige','night','oak','black']} onChange={v => setTweak('ground', v)} />
    </TweaksPanel>
  </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
