<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>More Muslim — Social Studio</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: rgba(246,225,198,0.4); color: #511C14; font-family: var(--font-serif); height: 100vh; overflow: hidden; }
  .app { display: grid; grid-template-columns: 340px 1fr; height: 100vh; }
  .panel { background: rgba(246,225,198,0.5); border-right: 1px solid rgba(81,28,20,0.1); padding: 20px 16px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 0 4px 6px; }
  .brand img { height: 52px; }
  /* Collapsible, card-grouped sections */
  .sect { background: rgba(255,255,255,0.45); border: 1px solid rgba(81,28,20,0.09); border-radius: 11px; padding: 11px 13px; }
  .sect:empty { display: none; padding: 0; border: none; background: none; }
  .sect-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; width: 100%; background: none; border: none; padding: 0; margin: 0; cursor: pointer; color: #511C14; text-align: left; font-family: inherit; }
  .sect-head .chev { font-size: 10px; opacity: 0.4; transition: transform 0.2s ease; flex: none; }
  .sect.collapsed .chev { transform: rotate(-90deg); }
  .sect-body { margin-top: 11px; }
  .sect.collapsed .sect-body { display: none; }
  .sect h4 { margin: 0; font-size: 11px; letter-spacing: 0.165em; text-transform: uppercase; color: #511C14; font-weight: 500; font-family: 'ABCDiatype', -apple-system, sans-serif; }
  .tlist { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .titem { text-align: left; padding: 8px 10px; border: none; border-radius: 7px; background: rgba(81,28,20,0.04); color: #511C14; font-family: var(--font-serif); font-size: 13px; line-height: 1.15; cursor: pointer; transition: all 0.12s; width: 100%; }
  .titem:hover { background: rgba(81,28,20,0.1); }
  .titem.on { background: #511C14; color: #F6E1C6; }
  .swatches { display: flex; flex-wrap: wrap; gap: 8px; }
  .sw { width: 32px; height: 32px; border-radius: 2px; cursor: pointer; border: 2px solid transparent; transition: transform 0.12s; }
  .sw:hover { transform: scale(1.1); }
  .sw.on { border-color: #511C14; box-shadow: 0 0 0 1px rgba(81,28,20,0.3); }
  .seg { display: flex; gap: 4px; align-items: center; }
  .seg button { flex: 1; padding: 7px 0; font-family: var(--font-serif); font-size: 11px; letter-spacing: 0.165em; text-transform: uppercase; border: 1px solid rgba(81,28,20,0.18); background: transparent; color: #511C14; cursor: pointer; transition: all 0.12s; }
  .seg button.on { background: #511C14; color: #F6E1C6; border-color: transparent; }
  .stage { position: relative; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 40px; background: rgba(246,225,198,0.25); }
  .stagewrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .frameshadow { box-shadow: 0 12px 40px rgba(81,28,20,0.18); overflow: hidden; }
  .meta { font-size: 13px; letter-spacing: 0.165em; text-transform: uppercase; color: #511C14; }
  .hint { font-size: 14px; line-height: 1.55; color: #511C14; }
  .imgpick { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; }
  .imgthumb { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; border: 2px solid transparent; opacity: 0.45; transition: all 0.12s; background: none; padding: 0; display: block; }
  .imgthumb:hover { opacity: 0.75; }
  .imgthumb.on { border-color: #511C14; opacity: 1; box-shadow: 0 0 0 2px #511C14; }
  .nonebtn { grid-column: span 3; padding: 7px 0; font-family: var(--font-serif); font-size: 11px; letter-spacing: 0.165em; text-transform: uppercase; background: rgba(81,28,20,0.05); border: 1px solid rgba(81,28,20,0.14); color: #511C14; cursor: pointer; }
  .nonebtn.on { border-color: #511C14; opacity: 1; }
  .uploadbtn { grid-column: span 3; padding: 7px 0; font-family: var(--font-serif); font-size: 13px; letter-spacing: 0.04em; text-transform: none; background: rgba(226,177,109,0.1); border: 1px solid rgba(226,177,109,0.35); color: #7a4a0a; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.12s; }
  .uploadbtn:hover { background: rgba(226,177,109,0.2); }
  .uploadbtn.on { border-color: #E2B16D; color: #7a4a0a; }
  .uploadbtn.dragging, .srt-file-btn.dragging { border-color: #511C14; border-style: dashed; background: rgba(226,177,109,0.4); }
  input[type=file]#imgupload, input[type=file]#audioupload, input[type=file]#srtupload, input[type=file]#srtupload2, input[type=file]#coverimgupload { display: none; }
  .cover-opts { display:flex; flex-direction:column; gap:2px; margin-bottom:10px; }
  .cover-opt-btn { text-align:left; padding:7px 10px; border:none; border-left:2px solid transparent; background:transparent; color:#511C14; font-family:'ABCDiatype',sans-serif; font-size:13px; cursor:pointer; transition:all 0.12s; width:100%; }
  .cover-opt-btn:hover { background:rgba(81,28,20,0.06); }
  .cover-opt-btn.on { background:rgba(81,28,20,0.09); border-left-color:#511C14; }
  .cover-tpl-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; margin:8px 0; }
  .cover-tpl-opt { cursor:pointer; background:rgba(81,28,20,0.04); border:none; padding:0; overflow:hidden; transition:all 0.12s; display:flex; flex-direction:column; }
  .cover-tpl-opt:hover { background:rgba(81,28,20,0.08); }
  .cover-tpl-opt.on { outline:2px solid #511C14; }
  .cover-tpl-lbl { font-family:'ABCDiatype',sans-serif; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; text-align:center; padding:5px 2px; color:#511C14; }
  .cover-tpl-opt.on .cover-tpl-lbl { background:#511C14; color:#F6E1C6; }
  .capture-cover-btn { width:100%; padding:10px; background:rgba(81,28,20,0.07); border:1px solid rgba(81,28,20,0.18); color:#511C14; font-family:'ABCDiatype',sans-serif; font-size:13px; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; transition:all 0.12s; margin-top:6px; }
  .capture-cover-btn:hover:not(:disabled) { background:rgba(81,28,20,0.13); }
  .capture-cover-btn:disabled { opacity:0.35; cursor:wait; }
  .srt-file-btn { display:block; width:100%; margin-bottom:6px; padding:7px 10px; background:rgba(226,177,109,0.08); border:1px solid rgba(226,177,109,0.25); color:#7a4a0a; font-family:'ABCDiatype',sans-serif; font-size:13px; letter-spacing:0.02em; text-transform:none; cursor:pointer; text-align:center; transition:all 0.12s; }
  .srt-file-btn:hover { background:rgba(226,177,109,0.15); }
  .srt-file-btn.on { border-color:#E2B16D; background:rgba(226,177,109,0.1); }
  .cropslider { width: 100%; accent-color: #511C14; cursor: pointer; margin-top: 4px; }
  .croplabel { font-size: 11px; letter-spacing: 0.165em; text-transform: uppercase; color: #511C14; display: block; margin-top: 10px; }
  .txfield { width: 100%; background: rgba(81,28,20,0.04); border: 1px solid rgba(81,28,20,0.14); color: #511C14; font-family: var(--font-serif); font-size: 14px; padding: 7px 10px; box-sizing: border-box; resize: none; outline: none; transition: border-color 0.15s; line-height: 1.4; }
  .txfield:focus { border-color: rgba(81,28,20,0.4); }
  .txlabel { font-size: 11px; letter-spacing: 0.165em; text-transform: uppercase; color: #511C14; display: block; margin: 10px 0 4px; }
  .richtextarea { display: flex; flex-direction: column; }
  .rttoolbar { display: flex; gap: 2px; padding: 3px 5px; background: rgba(81,28,20,0.04); border: 1px solid rgba(81,28,20,0.12); border-bottom: none; }
  .rtbtn { background: transparent; border: none; color: #511C14; font-family: var(--font-serif); font-size: 12px; cursor: pointer; padding: 2px 6px; line-height: 1; }
  .rtbtn:hover { opacity: 1; }
  .rtfield { min-height: 3em; cursor: text; }
  .carousel-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
  .carousel-item { display: flex; align-items: center; gap: 8px; background: rgba(81,28,20,0.04); border: 1px solid rgba(81,28,20,0.1); padding: 6px 8px; }
  .carousel-swatch { flex: none; display: flex; align-items: center; justify-content: center; font-size: 7px; letter-spacing: 0.08em; text-transform: uppercase; }
  .carousel-meta { flex: 1; min-width: 0; }
  .carousel-meta-tpl { font-size: 13px; color: #511C14; }
  .carousel-meta-sub { font-size: 13px; color: #511C14; text-transform: uppercase; letter-spacing: 0.165em; margin-top: 2px; }
  .carousel-actions { display: flex; gap: 2px; flex: none; }
  .carousel-btn { background: transparent; border: none; color: #511C14; cursor: pointer; padding: 3px 6px; font-size: 13px; line-height: 1; }
  .carousel-btn:hover:not(:disabled) { opacity: 1; }
  .carousel-btn:disabled { opacity: 0.18; cursor: default; }
  .carousel-add { width: 100%; padding: 8px; background: transparent; border: 1px dashed rgba(81,28,20,0.25); color: #511C14; font-family: var(--font-serif); font-size: 11px; letter-spacing: 0.165em; text-transform: uppercase; cursor: pointer; text-align: center; transition: all 0.12s; }
  .carousel-add:hover { background: rgba(81,28,20,0.05); border-color: #511C14; opacity: 1; }
  .export-btn { width: 100%; margin-top: 8px; padding: 11px; background: #511C14; border: none; color: #F6E1C6; font-family: var(--font-serif); font-size: 11px; letter-spacing: 0.165em; text-transform: uppercase; cursor: pointer; transition: background 0.15s; }
  .export-btn:hover:not(:disabled) { background: #3a100a; }
  .filmstrip { display:flex; gap:12px; align-items:flex-start; padding:8px 2px 2px; max-width:min(920px,92vw); overflow-x:auto; }
  .film-slide { position:relative; flex:none; cursor:pointer; }
  .film-thumb { overflow:hidden; background:#fff; box-shadow:0 2px 10px rgba(81,28,20,0.16); outline:2px solid transparent; transition:outline-color .12s; }
  .film-slide.on .film-thumb { outline-color:#511C14; }
  .film-slide:hover .film-thumb { outline-color:rgba(81,28,20,0.4); }
  .film-cap { font-family:'ABCDiatype',sans-serif; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:#511C14; text-align:center; margin-top:5px; opacity:0.5; white-space:nowrap; }
  .film-slide.on .film-cap { opacity:1; }
  .film-acts { position:absolute; top:4px; right:4px; display:flex; gap:3px; opacity:0; transition:opacity .12s; }
  .film-slide:hover .film-acts { opacity:1; }
  .film-acts button { width:19px; height:19px; border:none; border-radius:2px; background:rgba(81,28,20,0.82); color:#F6E1C6; cursor:pointer; font-size:11px; line-height:1; display:flex; align-items:center; justify-content:center; padding:0; }
  .film-acts button:hover:not(:disabled) { background:#511C14; }
  .film-acts button:disabled { opacity:0.3; cursor:default; }
  .film-add { flex:none; align-self:flex-start; width:46px; height:116px; border:1px dashed rgba(81,28,20,0.3); background:transparent; color:#511C14; font-size:24px; cursor:pointer; transition:all .12s; }
  .film-add:hover { background:rgba(81,28,20,0.05); border-color:#511C14; }
  .export-btn:disabled { opacity: 0.4; cursor: wait; }
  #audiogram-transport { display: flex; align-items: center; gap: 10px; width: min(520px,92vw); color: #511C14; font: 12px/1.3 var(--font-serif); }
  #audiogram-transport:empty { display: none; }
  .atbtn { background: rgba(81,28,20,0.07); color: #511C14; border: 1px solid rgba(81,28,20,0.18); padding: 7px 13px; cursor: pointer; font: 13px var(--font-serif); white-space: nowrap; transition: border-color 0.12s; }
  .atbtn:hover { border-color: rgba(81,28,20,0.45); background: rgba(81,28,20,0.12); }
  .sway-label { font-size: 11px; letter-spacing: 0.165em; text-transform: uppercase; color: #511C14; width: 100%; margin-bottom: 2px; }
  @font-face { font-family: 'ABCDiatype'; src: url('../../uploads/ABCDiatype-Regular-Trial.otf') format('opentype'); font-weight: 400; font-style: normal; }
  @font-face { font-family: 'ABCDiatype'; src: url('../../uploads/ABCDiatype-Medium-Trial.otf') format('opentype'); font-weight: 500; font-style: normal; }
  .sect h4, .titem, .seg button, .txlabel, .txfield, .uploadbtn, .nonebtn, .export-btn,
  .croplabel, .sway-label, .meta, .hint, .atbtn, .carousel-add, .carousel-meta-tpl,
  .carousel-meta-sub, .rtbtn, #audiogram-transport { font-family: 'ABCDiatype', -apple-system, sans-serif; }
</style>
<script>function toggleSect(b){ b.closest('.sect').classList.toggle('collapsed'); }</script>

<div class="app">
  <aside class="panel">
    <div class="brand"><img id="__brand-logo" src="../../assets/logos/logo-horizontal-oak.svg" alt="More Muslim"><script>document.addEventListener("DOMContentLoaded",()=>{document.getElementById("__brand-logo").src=_LOGO();});</script><a href="onboarding.html" style="margin-left:auto;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(81,28,20,.5);text-decoration:none;border:1px solid rgba(81,28,20,.18);padding:4px 9px;letter-spacing:.1em;font-size:10px;font-family:'ABCDiatype',sans-serif;transition:all .15s" onmouseover="this.style.color='#511C14';this.style.borderColor='rgba(81,28,20,.5)'" onmouseout="this.style.color='rgba(81,28,20,.5)';this.style.borderColor='rgba(81,28,20,.18)'" onclick="return confirm('Start the guided setup wizard? Unsaved changes to the current post will be lost.')">✦ Setup wizard</a></div>
    <div class="sect">
      <button class="sect-head" onclick="toggleSect(this)"><h4>Template</h4><span class="chev">⌄</span></button>
      <div class="sect-body"><div class="tlist" id="tlist"></div></div>
    </div>
    <div class="sect">
      <button class="sect-head" onclick="toggleSect(this)"><h4>Format</h4><span class="chev">⌄</span></button>
      <div class="sect-body"><div class="seg" id="formats"></div></div>
    </div>
    <div class="sect">
      <button class="sect-head" onclick="toggleSect(this)"><h4>Colourway</h4><span class="chev">⌄</span></button>

    </div>
    <div class="sect" id="cover-sect"></div>
    <div class="sect">
      <button class="sect-head" onclick="toggleSect(this)"><h4>Content</h4><span class="chev">⌄</span></button>
      <div class="sect-body"><div id="textedit"></div></div>
    </div>
    <div class="sect">
      <button class="sect-head" onclick="toggleSect(this)"><h4 id="carousel-label"></h4><span class="chev">⌄</span></button>
      <div class="sect-body"><div id="carousel"></div></div>
    </div>
    <div style="margin-top:auto; padding:4px 4px 0">
      <p class="hint" style="font-size:12px; opacity:0.7; line-height:1.5">Instagram formats: portrait (4:5) &amp; story (9:16). Nine brand colourways, each on its approved ground × ink pairing.</p>

  </aside>
  <main class="stage">
    <div class="stagewrap">
      <div id="preview" class="frameshadow" style="position:relative"></div>
      <div id="audiogram-transport"></div>
      <div class="meta" id="metaline"></div>
      <div id="drag-toolbar" style="display:flex;gap:8px;align-items:center;margin-top:4px;">
        <button id="drag-toggle" onclick="toggleDrag()" style="padding:7px 14px;font-family:var(--font-serif);font-size:11px;letter-spacing:0.165em;text-transform:uppercase;background:rgba(81,28,20,0.07);border:1px solid rgba(81,28,20,0.18);color:#511C14;cursor:pointer;transition:all 0.15s;">✥ Drag elements</button>
        <button onclick="resetDrag()" style="padding:7px 14px;font-family:var(--font-serif);font-size:11px;letter-spacing:0.165em;text-transform:uppercase;background:transparent;border:1px solid rgba(81,28,20,0.14);color:#511C14;cursor:pointer;opacity:0.6;transition:all 0.15s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6">↺ Reset</button>
      </div>
      <div id="filmstrip" class="filmstrip"></div>
    </div>
  </main>
</div>

  ];
}

function fmt(s) { s=Math.max(0,Math.floor(s||0)); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

function renderTemplate(tpl, way, format, scale, image, cropX, cropY, cropZoom, c, imgOpacity, pattern=true) {
  const common = { scale, way, format, image, cropX, cropY, cropZoom, imgOpacity, pattern };
  switch(tpl) {
    case 'cover':     return <S.CoverPost {...common} presents={c.presents} title={c.title} episode={c.episode} />;
    case 'quote':     return <S.QuotePost {...common} episode={c.episode} exchanges={[{speaker:c.s1,text:c.t1},{speaker:c.s2,text:c.t2}]} />;
    case 'synopsis':  return <S.SynopsisPost {...common} episode={c.episode} paragraphs={[c.p1,c.p2].filter(Boolean)} />;
    case 'streaming': return <S.NowStreamingPost {...common} episode={c.episode} lines={[c.l1,c.l2]} />;
    case 'credits': return <S.CreditsPost {...common} episode={c.episode} credits={c.credits||[]} />;
    default:          return null;
  }
}

// One thumbnail in the carousel filmstrip — memoized so only the edited slide re-renders
const FilmSlide = React.memo(function FilmSlide({ slide, index, isActive, canDel, onSelect, onDup, onDel, onDragStart, onDrop }) {
  const sz = S.SIZES[slide.format];
  const H = 116, fScale = H / sz.h, W = sz.w * fScale;
  const cFields = slide.content[slide.tpl] || slide.content;
  return (
    <div className={"film-slide"+(isActive?" on":"")} title={TEMPLATES[slide.tpl].label}
      draggable onClick={()=>onSelect(index)}
      onDragStart={()=>onDragStart(index)} onDragOver={e=>{e.preventDefault();}} onDrop={()=>onDrop(index)}>
      <div className="film-thumb" style={{width:W,height:H}}>
        <div style={{width:sz.w,height:sz.h,transform:`scale(${fScale})`,transformOrigin:'top left',pointerEvents:'none'}}>
          {slide.tpl==='audiogram'
            ? <div style={{width:sz.w,height:sz.h,background:'#192136',display:'flex',alignItems:'center',justifyContent:'center',color:'#F6E1C6',fontSize:160}}>▶</div>
            : renderTemplate(slide.tpl, slide.way, slide.format, 1, thumbOf(slide.image), slide.cropX, slide.cropY, slide.cropZoom, cFields, slide.imgOpacity, slide.pattern)}
        </div>
      </div>
      <div className="film-cap">{index+1} · {TEMPLATES[slide.tpl].label}</div>
      <div className="film-acts">
        <button title="Duplicate" onClick={e=>{e.stopPropagation();onDup(index);}}>⧉</button>
        <button title="Delete" disabled={!canDel} onClick={e=>{e.stopPropagation();onDel(index);}}>×</button>
      </div>
    </div>
  );
});

function RichTextarea({ id, value, onChange, rows }) {
  const ref = React.useRef();
  React.useEffect(() => { if (ref.current && document.activeElement !== ref.current) ref.current.innerHTML = value || ''; }, [value]);
  const emit = () => onChange(ref.current.innerHTML);
  const execCmd = (cmd) => { ref.current.focus(); document.execCommand(cmd, false, null); emit(); };
  return (
    <div className="richtextarea">
      <div className="rttoolbar">
        <button type="button" className="rtbtn" onMouseDown={e=>{e.preventDefault();document.execCommand('bold',false,null);emit()}}><b>B</b></button>
        <button type="button" className="rtbtn" onMouseDown={e=>{e.preventDefault();document.execCommand('italic',false,null);emit()}}><i>I</i></button>
      </div>
      <div ref={ref} id={id} className="txfield rtfield" contentEditable suppressContentEditableWarning onInput={emit} style={{minHeight:`${(rows||2)*1.5}em`}} />
    </div>
  );
}

async function exportCarouselFrames(carousel) {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:-1;pointer-events:none;';
  document.body.appendChild(container);
  const zip = new JSZip();
  for (let idx = 0; idx < carousel.length; idx++) {
    const item = carousel[idx];
    const sz = S.SIZES[item.format];
    const cFields = item.content[item.tpl] || item.content;
    const wrapper = document.createElement('div');
    wrapper.style.cssText = `width:${sz.w}px;height:${sz.h}px;overflow:hidden;flex:none;`;
    container.appendChild(wrapper);
    const root = ReactDOM.createRoot(wrapper);
    await new Promise(resolve => {
      root.render(renderTemplate(item.tpl, item.way, item.format, 1, item.image, item.cropX, item.cropY, item.cropZoom, cFields, item.imgOpacity||1, item.pattern));
      setTimeout(resolve, 1400);
    });
    const canvas = await html2canvas(wrapper, { width:sz.w, height:sz.h, scale:1, useCORS:true, allowTaint:true, logging:false });
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    zip.file(`slide-${String(idx+1).padStart(2,'0')}.png`, blob);
    root.unmount();
    container.removeChild(wrapper);
  }
  document.body.removeChild(container);
  saveAs(await zip.generateAsync({type:'blob'}), 'more-muslim-carousel.zip');
}

function App() {
  // ── Carousel = ordered array of slides; the editor edits the active slide ──
  const [slides, setSlides] = React.useState(() => {
    try { const sv=localStorage.getItem('mm-studio-save'); if(sv){const p=JSON.parse(sv); if(Array.isArray(p)&&p.length) return p.map(s=>makeSlide({...s,content:{...JSON.parse(JSON.stringify(DEFAULTS)),...(s.content||{})}}));} } catch{}
    if (_pf && Array.isArray(_pf.slides) && _pf.slides.length) {
      return _pf.slides.map(s => makeSlide({ ...s, content: {...JSON.parse(JSON.stringify(DEFAULTS)), ...(s.content||{})} }));
    }
    return [ makeSlide({
      tpl: _pf?.tpl || "cover",
      way: _pf?.way || "night",
      format: _pf?.format || "portrait",
      image: _pf?.image !== undefined ? _pf.image : ASSET_BASE+'assets/imagery/illus-ep1.jpg',

  const setTpl=(v)=>patchActive({tpl:v}); const setWay=(v)=>patchActive({way:v});
  const setFormat=(v)=>patchActive({format:v}); const setImage=(v)=>patchActive({image:v});

  const setPattern=(v)=>patchActive({pattern:v});

  const [isDragging, setIsDragging] = React.useState(false);
  const [customImage, setCustomImage] = React.useState(null);
  const dragRef    = React.useRef(null);
  const fileRef    = React.useRef();
  const filmDragRef = React.useRef(null);
  const [exporting, setExporting] = React.useState(false);
  const [scaffoldEp, setScaffoldEp] = React.useState(7);

  // Keep activeIdx in range after deletions
  React.useEffect(()=>{ if (activeIdx > slides.length-1) setActiveIdx(Math.max(0, slides.length-1)); }, [slides.length, activeIdx]);

  // Audiogram
  const [audioSrc, setAudioSrc]       = React.useState(null);
  const [audioT, setAudioT]           = React.useState(0);
  const [audioDur, setAudioDur]       = React.useState(0);
  const [audioPlaying, setAudioPlaying] = React.useState(false);
  const [agExporting, setAgExporting] = React.useState(false);
  const [agExportPct, setAgExportPct] = React.useState(0);
  const iframeRef     = React.useRef();
  const audioFileRef  = React.useRef();
  const srtFileRef    = React.useRef();
  const srtUpload2Ref = React.useRef();
  const coverImgRef   = React.useRef();
  const [coverMode,      setCoverMode]      = React.useState('default');
  const [coverLayoutKey, setCoverLayoutKey] = React.useState('cover');
  const [coverImage,     setCoverImage]     = React.useState(null);
  const [capturingCover, setCapturingCover] = React.useState(false);

  const doExport = async () => { setExporting(true); try { await exportCarouselFrames(slides); } finally { setExporting(false); } };
  const [savedLabel, setSavedLabel] = React.useState('Save');
  const saveSession = React.useCallback(() => { try { const sv=slides.map(sl=>({...sl,image:sl.image?.startsWith('blob:')?null:sl.image})); localStorage.setItem('mm-studio-save',JSON.stringify(sv)); setSavedLabel('Saved ✓'); setTimeout(()=>setSavedLabel('Save'),2000); } catch(e){console.warn('Save failed',e);} }, [slides]);

  const pick      = (k) => patchActive({ tpl:k, way:TEMPLATES[k].way, format:TEMPLATES[k].format });
  const pickImage = (src) => patchActive({ image:src, cropX:50, cropY:50, cropZoom:1 });
  const upd       = (field, val) => setSlides(s => s.map((sl,i)=> i===activeIdx ? {...sl, content:{...sl.content, [sl.tpl]:{...sl.content[sl.tpl], [field]:val}}} : sl));

  // ── Slide operations (stable refs so FilmSlide thumbnails stay memoized) ──
  const selectSlide   = React.useCallback((i)=> setActiveIdx(i), []);
  const duplicateSlide= React.useCallback((i)=> setSlides(s=>{ const copy={...JSON.parse(JSON.stringify(s[i])), id:'sl'+Date.now()+'_'+(_slideSeq++)}; const next=[...s]; next.splice(i+1,0,copy); return next; }), []);
  const deleteSlide   = React.useCallback((i)=>{ setSlides(s=> s.length<=1 ? s : s.filter((_,j)=>j!==i)); setActiveIdx(ai=> i<ai?ai-1:ai); }, []);
  const filmDragStart = React.useCallback((i)=>{ filmDragRef.current=i; }, []);
  const filmDrop      = React.useCallback((to)=>{ const from=filmDragRef.current; filmDragRef.current=null; if(from==null||from===to)return; setSlides(s=>{ const next=[...s]; const [m]=next.splice(from,1); next.splice(to,0,m); return next; }); setActiveIdx(ai=> from===ai?to : (from<ai&&to>=ai?ai-1 : (from>ai&&to<=ai?ai+1:ai))); }, []);
  const addSlideAfter = () => { setSlides(s=>{ const sl=makeSlide({tpl:'synopsis', way:'beige', format:'portrait'}); const next=[...s]; next.splice(activeIdx+1,0,sl); return next; }); setActiveIdx(activeIdx+1); };
  const newEpisodeCarousel = (epNum) => { if (!confirm('Replace your current slides with a fresh episode carousel? This clears the current post.')) return; const ep=EPISODES.find(e=>e.e===epNum)||EPISODES[6]; setSlides(buildEpisodeCarousel(ep)); setActiveIdx(0); };

  const acceptImage = (file) => { if (!file || !file.type.startsWith('image')) return; const url=URL.createObjectURL(file); setCustomImage(url); pickImage(url); };
  const acceptAudio = (file) => { if (!file || !file.type.startsWith('audio')) return; setAudioSrc(URL.createObjectURL(file)); };
  const acceptSrt   = async (file) => { if (!file) return; upd('srt', await file.text()); };
  const handleUpload      = (e) => acceptImage(e.target.files[0]);
  const handleAudioUpload = (e) => acceptAudio(e.target.files[0]);
  const handleSrtUpload   = (e) => acceptSrt(e.target.files[0]);

  const dropZone = (accept) => ({

    onDrop: e => { e.preventDefault(); e.currentTarget.classList.remove('dragging'); accept(e.dataTransfer.files && e.dataTransfer.files[0]); },
  });

  const handleCoverImgUpload = (e) => {
    const file=e.target.files[0]; if (!file) return;
    setCoverImage(URL.createObjectURL(file));

  const captureCoverFromLayout = async () => {
    setCapturingCover(true);
    try {

      container.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:-1;pointer-events:none;';
      document.body.appendChild(container);
      const wrapper = document.createElement('div');
      wrapper.style.cssText = `width:${sz.w}px;height:${sz.h}px;overflow:hidden;flex:none;`;
      container.appendChild(wrapper);

      await new Promise(resolve => {

        setTimeout(resolve, 1400);
      });
      const canvas = await html2canvas(wrapper, { width:sz.w, height:sz.h, scale:1, useCORS:true, allowTaint:true, logging:false });
      const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      setCoverImage(URL.createObjectURL(blob));
      setCoverMode('upload');
      root2.unmount();
      document.body.removeChild(container);
    } finally { setCapturingCover(false); }
  };

  const audiogramCmd = React.useCallback((type, extra={}) => {
    iframeRef.current?.contentWindow?.postMessage({type,...extra},'*');
  }, []);

  // Pick up audio file passed from onboarding via IndexedDB
  React.useEffect(() => {
    try {
      const req = indexedDB.open('mm-studio', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('files');
      req.onsuccess = e => {
        const db = e.target.result;
        const tx = db.transaction('files', 'readonly');
        const getReq = tx.objectStore('files').get('pending-audio');
        getReq.onsuccess = () => {
          if (!getReq.result) return;

          tx2.objectStore('files').delete('pending-audio');
        };
      };
    } catch(err) { console.warn('IndexedDB audio load failed:', err); }
  }, []);

  // Keep iframe in sync with config
  React.useEffect(() => {
    if (tpl !== 'audiogram') return;
    const ac = content.audiogram || {};
    const coverImg = coverMode==='upload' ? coverImage : undefined;
    const msg = {
      type:'audiogram-config', hostWay:way, guestWay:ac.guestWay||'oak',
      episodeEyebrow:ac.episodeEyebrow, outroEpisode:ac.outroEpisode,
      outroLine1:ac.outroLine1, outroLine2:ac.outroLine2,
      coverTitle:ac.coverTitle, coverEpisode:ac.coverEpisode,

    iframeRef.current?.contentWindow?.postMessage(msg, '*');
  }, [tpl, way, content.audiogram, audioSrc, coverMode, coverImage, imgOpacity]);

  // Listen for time updates from iframe
  React.useEffect(() => {
    const onMsg = (e) => {
      const m = e.data; if (!m) return;
      if (m.type === 'audiogram-time') { setAudioT(m.t||0); setAudioDur(m.duration||0); setAudioPlaying(m.playing||false); }
      else if (m.type === 'audiogram-export-progress') { setAgExporting(true); setAgExportPct(m.pct||0); }
      else if (m.type === 'audiogram-export-done') { setAgExporting(false); setAgExportPct(0); }

    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const size     = S.SIZES[format];
  const maxH     = Math.max(240, Math.min(540, window.innerHeight - 330));

    if (!field||field==='url') { overlay.style.pointerEvents=''; return; }

      const newText=textEl.innerHTML;
      textEl.contentEditable='false'; textEl.style.outline=''; textEl.style.outlineOffset=''; textEl.style.borderRadius=''; textEl.style.minWidth='';
      overlay.style.pointerEvents='';
      textEl.removeEventListener('blur', done); textEl.removeEventListener('keydown', onKey);
      upd(field, newText);
    };
    const onKey=(ev)=>{ if(ev.key==='Escape') textEl.blur(); if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();textEl.blur();} };
    textEl.addEventListener('blur', done); textEl.addEventListener('keydown', onKey);
  };

  React.useEffect(() => {
    if (!isDragging) return;
    let rafId = null, lastX = 0, lastY = 0;
    const apply = () => {
      rafId = null;
      const d=dragRef.current; if (!d) return;
      const dx=lastX-d.startX, dy=lastY-d.startY, sens=1/cropZoom;
      setCropX(Math.max(0,Math.min(100,d.cropX-(dx/displayW*100)*sens)));
      setCropY(Math.max(0,Math.min(100,d.cropY-(dy/displayH*100)*sens)));
    };
    const onMove = (e) => {
      if (!dragRef.current) return;

      if (!rafId) rafId = requestAnimationFrame(apply);
    };
    const onUp = () => { setIsDragging(false); dragRef.current=null; if (rafId) cancelAnimationFrame(rafId); };

  return (

      <Mount el="formats">

            <label htmlFor="srtupload" className={"uploadbtn"+(content.audiogram?.srt && content.audiogram.srt !== AUDIOGRAM_SRT ? ' on' : '')} {...dropZone(acceptSrt)}>
              {content.audiogram?.srt && content.audiogram.srt !== AUDIOGRAM_SRT ? '✓ Captions loaded' : '+ Upload or drop captions (SRT)'}
            </label>

function Mount({ el, children }) {
  const node = document.getElementById(el);

}

const host = document.createElement("div");

<style id="__drag_overrides"></style>
<script>
// ── Drag-to-position with guides & snapping ─────────────────────────────
const _dOff = {};
const _dHistory = [];
let _dMode = false, _dEl = null, _dField = null;
let _dSX = 0, _dSY = 0, _dBX = 0, _dBY = 0;
let _dNatX = 0, _dNatY = 0, _dElW = 0, _dElH = 0;
let _dGuideX = null, _dGuideY = null;
let _overlay = null;

// Snap guides in canvas space (1080×1920)
const GUIDES_X = [85, 540, 1080-85];
const GUIDES_Y = [370, 960, 1920-370];
const SNAP_PX = 14;

function _preview() { return document.getElementById('preview'); }

function _dScale() {
  const el = document.querySelector('#preview [style*="scale("]');
  if (!el) return 1;
  const m = (el.style.transform||'').match(/scale\(([^)]+)\)/);
  return m ? parseFloat(m[1]) : 1;
}

function _sizeOverlay() {
  if (!_overlay) return;
  const r = _preview().getBoundingClientRect();
  Object.assign(_overlay.style, { left:r.left+'px', top:r.top+'px', width:r.width+'px', height:r.height+'px' });
  _drawGuides();
}

function _ensureGuideEls() {
  if (_overlay._guides) return _overlay._guides;
  const mk = (css) => { const d=document.createElement('div'); d.style.cssText='position:absolute;pointer-events:none;display:none;'+css; _overlay.appendChild(d); return d; };
  const g = {
    rect: mk('border:1px dashed rgba(81,28,20,0.22);'),
    hx:   mk('opacity:0.18;background:rgba(81,28,20,0.5);width:1px;top:0;height:100%;'),
    hy:   mk('opacity:0.18;background:rgba(81,28,20,0.5);left:0;width:100%;height:1px;'),
    sx:   mk('background:#C15A3A;opacity:0.85;z-index:2;top:0;width:2px;height:100%;'),
    sy:   mk('background:#C15A3A;opacity:0.85;z-index:2;left:0;width:100%;height:2px;'),
  };
  _overlay._guides = g;
  return g;
}

function _drawGuides(sc) {
  if (!_overlay) return;
  const g = _ensureGuideEls();
  if (!_dMode) { Object.values(g).forEach(el => el.style.display='none'); return; }
  sc = sc || _dScale();
  // Safe-zone margin rect
  const ml=85*sc, mt=370*sc, mr=(1080-85)*sc, mb=(1920-370)*sc;
  g.rect.style.display='block';
  g.rect.style.left=ml+'px'; g.rect.style.top=mt+'px';
  g.rect.style.width=(mr-ml)+'px'; g.rect.style.height=(mb-mt)+'px';
  // Center cross-hairs (during drag only)
  const dragging = !!_dEl;
  g.hx.style.display=dragging?'block':'none'; g.hx.style.left=(540*sc)+'px';
  g.hy.style.display=dragging?'block':'none'; g.hy.style.top=(960*sc)+'px';
  // Snap indicators
  if (_dGuideX!==null) { g.sx.style.display='block'; g.sx.style.left=(_dGuideX*sc)+'px'; } else g.sx.style.display='none';
  if (_dGuideY!==null) { g.sy.style.display='block'; g.sy.style.top=(_dGuideY*sc)+'px'; } else g.sy.style.display='none';
}

function _initOverlay() {
  if (_overlay) return;
  _overlay = document.createElement('div');
  _overlay.style.cssText = 'position:fixed;z-index:9999;display:none;cursor:crosshair;box-sizing:border-box;overflow:hidden;';
  document.body.appendChild(_overlay);
  window.addEventListener('resize', _sizeOverlay);

  _overlay.addEventListener('pointerdown', e => {
    _overlay.style.display = 'none';
    const stack = document.elementsFromPoint(e.clientX, e.clientY);
    _overlay.style.display = 'block';
    const preview = _preview();
    let el = null;
    for (const node of stack) {
      const c = node.closest('[data-field]');
      if (c && preview.contains(c)) { el = c; break; }
    }
    if (!el) return;
    _dField = el.getAttribute('data-field');
    _dEl = el;
    _dSX = e.clientX; _dSY = e.clientY;
    // Use inline transform as base if element hasn't been dragged yet
    const _it=(s=>{ const m=(s||'').match(/translate\((-?[\d.]+)px,\s*(-?[\d.]+)px\)/); return m?{x:parseFloat(m[1]),y:parseFloat(m[2])}:{x:0,y:0}; })(el.style.transform);
    _dBX = _dOff[_dField]!==undefined ? _dOff[_dField].x : _it.x;
    _dBY = _dOff[_dField]!==undefined ? _dOff[_dField].y : _it.y;
    _dHistory.push(JSON.parse(JSON.stringify(_dOff)));
    const sc=_dScale(), pr=preview.getBoundingClientRect(), er=el.getBoundingClientRect();
    _dElW=er.width/sc; _dElH=er.height/sc;
    _dNatX=(er.left-pr.left)/sc-_dBX;
    _dNatY=(er.top-pr.top)/sc-_dBY;
    _overlay.style.cursor='grabbing';
    _overlay.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  _overlay.addEventListener('pointermove', e => {
    if (!_dEl) return;
    const sc=_dScale();
    let px=_dBX+(e.clientX-_dSX)/sc;
    let py=_dBY+(e.clientY-_dSY)/sc;

    // Shift: lock to dominant axis
    if (e.shiftKey) {
      if (Math.abs(px-_dBX)>=Math.abs(py-_dBY)) py=_dBY; else px=_dBX;
    }

    // X snap
    _dGuideX=null;
    const l=_dNatX+px, r=l+_dElW, cx=l+_dElW/2;
    for (const g of GUIDES_X) {
      if (Math.abs(l-g)<SNAP_PX)  { px+=g-l;  _dGuideX=g; break; }
      if (Math.abs(cx-g)<SNAP_PX) { px+=g-cx; _dGuideX=g; break; }
      if (Math.abs(r-g)<SNAP_PX)  { px+=g-r;  _dGuideX=g; break; }
    }

    // Y snap
    _dGuideY=null;
    const t=_dNatY+py, b=t+_dElH, my=t+_dElH/2;
    for (const g of GUIDES_Y) {
      if (Math.abs(t-g)<SNAP_PX)  { py+=g-t;  _dGuideY=g; break; }
      if (Math.abs(my-g)<SNAP_PX) { py+=g-my; _dGuideY=g; break; }
      if (Math.abs(b-g)<SNAP_PX)  { py+=g-b;  _dGuideY=g; break; }
    }

    _dOff[_dField]={x:px,y:py};
    _dCSS(); _drawGuides(sc);
  });

  _overlay.addEventListener('pointerup', () => {
    if (_dEl) { _dEl=null; _dGuideX=null; _dGuideY=null; _overlay.style.cursor='crosshair'; _drawGuides(); }
  });
}

function _dCSS() {
  let css='';
  if (_dMode) css+='#preview [data-field]{outline:2px dashed rgba(81,28,20,0.4)!important;outline-offset:5px!important;cursor:grab!important;}\n';
  Object.entries(_dOff).forEach(([f,{x,y}]) => {
    css+=`#preview [data-field="${f}"]{transform:translate(${Math.round(x)}px,${Math.round(y)}px)!important;}\n`;
  });
  document.getElementById('__drag_overrides').textContent=css;
}

function toggleDrag() {
  _initOverlay();
  _dMode=!_dMode;
  _sizeOverlay();
  _overlay.style.display=_dMode?'block':'none';
  const btn=document.getElementById('drag-toggle');
  btn.style.background=_dMode?'#511C14':'rgba(81,28,20,0.07)';
  btn.style.color=_dMode?'#F6E1C6':'#511C14';
  btn.textContent=_dMode?'✥ Dragging (click to exit)':'✥ Drag elements';
  _dCSS(); _drawGuides();
}

function resetDrag() {
  Object.keys(_dOff).forEach(k=>delete _dOff[k]);
  _dHistory.length=0;
  _dCSS();
}

document.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey)&&e.key==='z'&&_dMode&&_dHistory.length) {
    e.preventDefault();
    const prev=_dHistory.pop();
    Object.keys(_dOff).forEach(k=>delete _dOff[k]);
    Object.assign(_dOff,prev);
    _dCSS();
  }
});
</script>
