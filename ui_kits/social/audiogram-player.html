  html, body { background: #0c1019; height: 100vh; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; }

<body>
<div id="root" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<!-- MP4 export: WebCodecs H.264 muxing (DOM→canvas done natively via SVG foreignObject) -->
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5/build/mp4-muxer.min.js"></script>
<script type="text/babel">
/* More Muslim — Audiogram Player
   Embedded in social-studio as iframe; also opens standalone for screen recording.
   Config + transport arrive via postMessage from the studio. Falls back to localStorage. */

const IS_IFRAME = window.self !== window.top;
const FPS = 12; // playback throttle + export frame rate (12fps for a stop-motion, documentary feel)
const SYNC_LEAD = 0.12; // captions lead the audio slightly — compensates fade-in + frame quantisation

const DEFAULT_SRT = `1
00:00:00,000 --> 00:00:01,650
Yassmin Abdel-Magied: Do you remember the first time you heard about

2
00:00:01,650 --> 00:00:03,590
people using chatbots as therapists?

3
00:00:03,770 --> 00:00:04,380
Dr. Rania Awaad: I do.

4
00:00:04,410 --> 00:00:05,699
Yeah, it was actually a patient of mine.

5
00:00:05,760 --> 00:00:08,580
And she said, in between our sessions,
I talked to a chatbot.

6
00:00:08,590 --> 00:00:10,290
And I said, come again?`;

const DEFAULT_CFG = {
  hostWay:'beige', guestWay:'oak',
  episodeEyebrow:'IN THERAPY, WITH SHEIKHAGPT',
  outroWay:'night', outroDuration:5,
  outroEpisode:'EPISODE 7',
  outroLine1:'Listen to the full episode at moremuslim.org.',
  outroLine2:'Or search for \u201CMore Muslim\u201D on Apple Podcasts, Spotify, or wherever you listen to podcasts.',
  wordMotion:'fade', captionSize:'L',
  showSpeakerLabel:true, bgDrift:true, illusTint:true, solidBg:false,
  highlight:'auto', // 'auto' | 'off' | block index \u2014 one sentence rendered as a large italic set piece
  speakerSwap:true, breathe:true, wordAccent:true,
  gateWeave:true, textZoom:true, paperTexture:true,
  imgZoom:1, imgCropX:50, imgCropY:50,
  srt:DEFAULT_SRT, audioSrc:null,
};

function loadCfg() {
  try {
    const s = localStorage.getItem('mm-audiogram-cfg');
    const cfg = s ? { ...DEFAULT_CFG, ...JSON.parse(s) } : DEFAULT_CFG;
    // blob: URLs never survive into a fresh document — treat a stored one as "no audio"
    // rather than letting playback/export silently fail on a dead URL.
    if (cfg.audioSrc && String(cfg.audioSrc).startsWith('blob:')) cfg.audioSrc = null;
    return cfg;
  }
  catch { return DEFAULT_CFG; }
}
function calcScale() {
  const pad = IS_IFRAME ? 0 : 20, bot = IS_IFRAME ? 0 : 70;
  return Math.max(0.10, Math.min((window.innerWidth - pad*2) / 1080, (window.innerHeight - pad*2 - bot) / 1920));
}

const clamp01 = (v) => Math.min(1, Math.max(0, v));
// Blend two #rrggbb colours; k=0 → a, k=1 → b.
function hexMix(a, b, k) {
  if (k <= 0) return a; if (k >= 1) return b;
  const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
  const r = Math.round(((pa>>16)&255) + (((pb>>16)&255) - ((pa>>16)&255))*k);
  const g = Math.round(((pa>>8)&255)  + (((pb>>8)&255)  - ((pa>>8)&255))*k);
  const bl = Math.round((pa&255)      + ((pb&255)       - (pa&255))*k);
  return '#' + ((1<<24)|(r<<16)|(g<<8)|bl).toString(16).slice(1);
}
// Deterministic pseudo-random in [0,1) from an integer — keeps grain motion reproducible per frame.
const frand = (n) => { const x = Math.sin(n*127.1 + 311.7)*43758.5453; return x - Math.floor(x); };
// Tileable noise as a data URI (v=0 → dark speckles for light grounds, v=1 → light speckles for dark grounds).
const grainURI = (v) => 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
  `<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="matrix" values="0 0 0 0 ${v} 0 0 0 0 ${v} 0 0 0 0 ${v} 0 0 0 0.55 0"/></filter><rect width="280" height="280" filter="url(#n)"/></svg>`);
const GRAIN_DARK = grainURI(0), GRAIN_LIGHT = grainURI(1);
// Coarser second octave — paper tooth. Drifts slowly instead of jumping like the grain.
const paperURI = (v) => 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
  `<svg xmlns="http://www.w3.org/2000/svg" width="520" height="520"><filter id="p"><feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="matrix" values="0 0 0 0 ${v} 0 0 0 0 ${v} 0 0 0 0 ${v} 0 0 0 0.5 0"/></filter><rect width="520" height="520" filter="url(#p)"/></svg>`);
const PAPER_DARK = paperURI(0), PAPER_LIGHT = paperURI(1);

class AudiogramPlayer extends React.Component {
  state = { t:0, duration:0, playing:false, started:false, scale:calcScale(), cfg:loadCfg(), exporting:false, exportPct:0 };

  // accent = the palette colour used for the actively-spoken word + speaker label on this ground
  // (terracotta on light grounds, harvest yellow on dark grounds — approved high-contrast pairings).
  ways = {
    beige:   { bg:'#FBF2E9', tile:'6A', ink:'#511C14', accent:'#C15A3A', logo:'oak',   grain:0.06, tileOpacity:0.10 },
    oak:     { bg:'#511C14', tile:'6B', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige', grain:0.10, tileOpacity:0.15 },
    night:   { bg:'#192136', tile:'5C', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige', grain:0.10, tileOpacity:0.15 },
    mist:    { bg:'#9FBCCC', tile:'2B', ink:'#192136', accent:'#C15A3A', logo:'night', grain:0.07, tileOpacity:0.10 },
    black:   { bg:'#000000', tile:null, ink:'#FBF2E9', accent:'#E2B16D', logo:'beige', grain:0.14, tileOpacity:0 },
    harvest:    { bg:'#E2B16D', tile:'3A', ink:'#511C14', accent:'#C15A3A', logo:'oak',   grain:0.08, tileOpacity:0.10 },
    terracotta: { bg:'#C15A3A', tile:'6B', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige', grain:0.10, tileOpacity:0.15 },
    coastal:    { bg:'#6185A3', tile:'2B', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige', grain:0.08, tileOpacity:0.12 },
    stone:      { bg:'#3C5065', tile:'5C', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige', grain:0.10, tileOpacity:0.15 },
    ep1: { bg:'#192136', isImage:true, image:'../../assets/imagery/bg-illus-ep1.jpg', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige' },
    ep2: { bg:'#192136', isImage:true, image:'../../assets/imagery/bg-illus-ep2.jpg', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige' },
    ep3: { bg:'#192136', isImage:true, image:'../../assets/imagery/bg-illus-ep3.jpg', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige' },
    ep4: { bg:'#192136', isImage:true, image:'../../assets/imagery/bg-illus-ep4.jpg', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige' },
    ep5: { bg:'#192136', isImage:true, image:'../../assets/imagery/bg-illus-ep5.jpg', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige' },
    ep6: { bg:'#192136', isImage:true, image:'../../assets/imagery/bg-illus-ep6.jpg', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige' },
    ep7: { bg:'#192136', isImage:true, image:'../../assets/imagery/bg-illus-ep7.jpg', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige' },
    ep8: { bg:'#192136', isImage:true, image:'../../assets/imagery/bg-illus-ep8.jpg', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige' },
    ep9: { bg:'#192136', isImage:true, image:'../../assets/imagery/bg-illus-ep9.jpg', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige' },
    ep10: { bg:'#192136', isImage:true, image:'../../assets/imagery/bg-illus-ep10.jpg', ink:'#F6E1C6', accent:'#E2B16D', logo:'beige' },
  };

  ensureParsed() {
    const srt = this.state.cfg.srt || '';
    if (this._parsed && this._srtKey === srt) return;
    this._srtKey = srt; this._parsed = false;
    const norm = srt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim();
    const cues = [];
    for (const ch of norm.split(/\n\s*\n/)) {
      const lines = ch.split('\n').filter(l => l.trim());
      if (lines.length < 2) continue;
      const ti = lines.findIndex(l => /-->/.test(l));
      if (ti < 0) continue;
      const tm = lines[ti].match(/(\d{2}):(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/);
      if (!tm) continue;
      const start = +tm[1]*3600 + +tm[2]*60 + +tm[3] + +tm[4]/1000;
      const end   = +tm[5]*3600 + +tm[6]*60 + +tm[7] + +tm[8]/1000;
      let txt = lines.slice(ti+1).join(' ').replace(/\s+/g,' ').trim();
      let speaker = null;
      const sm = txt.match(/^([^:]{1,40}):\s+/);
      if (sm) { const cand=sm[1].trim(), ws=cand.split(/\s+/); if (ws.length<=4 && ws.every(w=>/^[A-Z]/.test(w))) { speaker=cand; txt=txt.slice(sm[0].length); } }
      cues.push({ start, end, text:txt, speaker });
    }
    let sp=null; const words=[];
    for (const c of cues) {
      if (c.speaker) sp=c.speaker;
      const toks=c.text.split(/\s+/).filter(Boolean), wts=toks.map(t=>t.length+1), tot=wts.reduce((a,b)=>a+b,0)||1;
      let acc=0;
      for (let i=0; i<toks.length; i++) {
        const s=c.start+(acc/tot)*(c.end-c.start); acc+=wts[i];
        words.push({ text:toks[i], start:s, end:c.start+(acc/tot)*(c.end-c.start), speaker:sp });
      }
    }
    const blocks=[]; let cur=null;
    for (const w of words) {
      if (!cur||cur.speaker!==w.speaker) { cur={ speaker:w.speaker, words:[], start:w.start, end:w.end }; blocks.push(cur); }
      cur.words.push({ text:w.text, start:w.start }); cur.end=w.end;
      if (/[.!?]["')\]]*$/.test(w.text)) cur=null;
    }
    const seen=[]; for (const b of blocks) if (b.speaker&&!seen.includes(b.speaker)) seen.push(b.speaker);
    this.blocks=blocks; this.host=seen[0]; this.guest=seen[1];
    this.contentEnd=blocks.length ? blocks[blocks.length-1].end : 0;
    this._parsed=true;
  }

  firstName(s) {
    if (!s) return '';
    return (s.replace(/^(dr|mr|mrs|ms|prof|sheikh|sheikha|imam)\.?\s+/i,'').trim().split(/\s+/)[0]||'').replace(/[^\w'-].*$/,'');
  }

  componentDidMount() {
    this._onResize(); window.addEventListener('resize', this._onResize);
    this._raf = requestAnimationFrame(this.tick);
    window.addEventListener('message', this._onMessage);
    window.addEventListener('storage', this._onStorage);
    this._loadHandoffAudio();
    this._loadEnv();
  }
  componentWillUnmount() {
    cancelAnimationFrame(this._raf);
    window.removeEventListener('resize', this._onResize);
    window.removeEventListener('message', this._onMessage);
    window.removeEventListener('storage', this._onStorage);
  }

  // The Studio's "Open player" button hands the audio over via IndexedDB, because
  // blob: URLs from the Studio tab are not valid in this tab. When the config flags
  // audioSrc:'pending', poll for the stashed blob and adopt it (then clear it).
  _loadHandoffAudio = () => {
    if (this.state.cfg.audioSrc !== 'pending') return;
    let tries = 0;
    const poll = () => {
      tries++;
      const retry = () => { if (tries < 15) setTimeout(poll, 400); };
      try {
        const req = indexedDB.open('mm-studio', 1);
        req.onupgradeneeded = e => { const db = e.target.result; if (!db.objectStoreNames.contains('files')) db.createObjectStore('files'); };
        req.onsuccess = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('files')) return retry();
          const g = db.transaction('files', 'readonly').objectStore('files').get('player-audio');
          g.onsuccess = () => {
            if (g.result) { this._patch({ audioSrc: URL.createObjectURL(g.result) }); try { db.transaction('files', 'readwrite').objectStore('files').delete('player-audio'); } catch {} }
            else retry();
          };
          g.onerror = retry;
        };
        req.onerror = retry;
      } catch (err) { retry(); }
    };
    poll();
  };

  _onResize = () => { const s=calcScale(); if (Math.abs(s-this.state.scale)>0.002) this.setState({scale:s}); };

  _onMessage = (e) => {
    if (!e.data) return; const m=e.data;
    if      (m.type==='audiogram-config')  { const {type,...p}=m; this._patch(p); }
    else if (m.type==='audiogram-play')    { this.audio?.play(); }
    else if (m.type==='audiogram-pause')   { this.audio?.pause(); }
    else if (m.type==='audiogram-restart') { if(this.audio){this.audio.currentTime=0;this.audio.volume=1;this.audio.play();} this.setState({t:0,started:true}); }
    else if (m.type==='audiogram-seek')    { if(this.audio) this.audio.currentTime=m.time; this.setState({t:m.time,started:true}); }
    else if (m.type==='audiogram-export')  { this.exportVideo(); }
  };

  _onStorage = (e) => {
    if (e.key!=='mm-audiogram-cfg') return;
    // Storage sync carries content/config only. Audio arrives via postMessage (Blob) or the
    // IndexedDB handoff — a stored audioSrc (always null or stale) must never clobber it.
    try { const {audioSrc:_a, audioBlob:_b, ...rest}=JSON.parse(e.newValue||'{}'); this._patch(rest); } catch {}
  };

  _patch(patch) {
    const prev=this.state.cfg;
    // Audio can arrive as a Blob (structured-clone from the studio). Mint our own
    // object URL so it is always valid in THIS document — blob: URLs created in
    // another tab or a previous session are dead on arrival.
    if (patch.audioBlob) {
      const blobKey = patch.audioBlob.size + ':' + patch.audioBlob.type;
      if (this._audioBlobKey === blobKey) {
        // Same audio re-sent on an unrelated config change — keep the current URL, don't restart.
        const {audioBlob:_b, audioSrc:_s, ...rest} = patch; patch = rest;
      } else {
        this._audioBlobKey = blobKey;
        try { patch = {...patch, audioSrc: URL.createObjectURL(patch.audioBlob)}; } catch {}
        delete patch.audioBlob;
      }
    }
    this.setState(s=>({cfg:{...s.cfg,...patch}}), ()=>{
      if (patch.srt && patch.srt!==prev.srt) this._parsed=false;
      if (patch.audioSrc && patch.audioSrc!==prev.audioSrc) {
        if (this.audio) { this.audio.src=patch.audioSrc; this.audio.load(); }
        this.setState({t:0,duration:0,started:false,playing:false});
        this._loadEnv();
      } else if (patch.audioSrc===null && prev.audioSrc) {
        // Audio explicitly removed: unload the element and forget the blob key so the
        // same file can be re-uploaded later.
        this._audioBlobKey=null; this._env=null; this._envSrc=null;
        if (this.audio) { this.audio.pause(); this.audio.removeAttribute('src'); this.audio.load(); }
        this.setState({t:0,duration:0,started:false,playing:false});
      }
    });
  }

  // ── Audio loudness envelope (per-frame RMS) ────────────────────────────────
  // Drives the "breathing" of the pattern ground. Precomputed from the decoded
  // audio so playback and the offline export read the exact same values — every
  // visual stays a deterministic function of t.
  _envFromBuffer(ab) {
    const ch=ab.getChannelData(0), win=Math.max(1, Math.round(ab.sampleRate/FPS));
    const n=Math.max(1, Math.ceil(ch.length/win)), out=new Float32Array(n);
    for (let i=0;i<n;i++) {
      let s=0; const st=i*win, en=Math.min(ch.length, st+win);
      for (let j=st;j<en;j++) s+=ch[j]*ch[j];
      out[i]=Math.sqrt(s/Math.max(1,en-st));
    }
    for (let i=1;i<n;i++) out[i]=Math.max(out[i], out[i-1]*0.82); // fast attack, slow decay
    const sorted=Array.from(out).sort((a,b)=>a-b), ref=sorted[Math.floor((n-1)*0.95)]||1;
    for (let i=0;i<n;i++) out[i]=clamp01(out[i]/(ref||1));
    return out;
  }
  _loadEnv = async () => {
    const src=this.state.cfg.audioSrc;
    if (!src || src==='pending' || this._envSrc===src) return;
    this._envSrc=src;
    try {
      const buf=await (await fetch(src)).arrayBuffer();
      const ac=new (window.AudioContext||window.webkitAudioContext)();
      const ab=await ac.decodeAudioData(buf); ac.close();
      if (this._envSrc===src) this._env=this._envFromBuffer(ab);
    } catch(e) { console.warn('Envelope decode failed — using gentle fallback breathing.', e); }
  };
  env(t) {
    const e=this._env;
    if (e && e.length) return e[Math.min(e.length-1, Math.max(0, Math.floor(t*FPS)))];
    return 0.35 + 0.3*(0.5 + 0.5*Math.sin(t*1.4)); // no audio decoded yet: slow neutral breathing
  }

  // ── Speaker-driven ground ──────────────────────────────────────────────────
  // The ground colourway follows whoever is speaking (host vs guest), crossfading
  // 0.5s at each hand-off. Disabled when either way is an illustration ground.
  wayFor(block) {
    const c=this.state.cfg;
    return (block && this.guest && block.speaker===this.guest) ? c.guestWay : c.hostWay;
  }
  swapEnabled() {
    const c=this.state.cfg, h=this.ways[c.hostWay], g=this.ways[c.guestWay];
    return !!(c.speakerSwap!==false && h && g && !h.isImage && !g.isImage && c.guestWay!==c.hostWay && this.guest);
  }
  groundState() {
    const t=this.state.t+SYNC_LEAD, bs=this.blocks||[], c=this.state.cfg;
    let cur=c.hostWay, prevW=c.hostWay, k=1;
    if (this.swapEnabled()) {
      let idx=-1;
      for (let i=0;i<bs.length;i++) { if (bs[i].start<=t) idx=i; else break; }
      if (idx>=0) {
        cur=this.wayFor(bs[idx]);
        prevW = idx>0 ? this.wayFor(bs[idx-1]) : c.hostWay;
        k = prevW===cur ? 1 : clamp01((t-bs[idx].start)/0.5);
      }
    }
    const wc=this.ways[cur]||this.ways.beige, wp=this.ways[prevW]||wc;
    return {
      cur, prev:prevW, k,
      ink:    hexMix(wp.ink,    wc.ink,    k),
      accent: hexMix(wp.accent||wc.ink, wc.accent||wc.ink, k),
    };
  }

  // Which block gets the large italic set-piece treatment.
  highlightIndex() {
    const h=this.state.cfg.highlight, bs=this.blocks||[];
    if (h==='off' || !bs.length) return -1;
    if (typeof h==='number') return (h>=0 && h<bs.length) ? h : -1;
    let best=-1, bestScore=-Infinity;
    bs.forEach((b,i)=>{
      const wc=b.words.length; let s=0;
      if (wc>=4 && wc<=16) s+=2; else if (wc<=20) s+=1; else s-=1;
      const last=(b.words[wc-1]||{}).text||'';
      if (/[?!]["')\]]*$/.test(last)) s+=1.5;
      if (/["“”‘’]/.test(b.words.map(w=>w.text).join(' '))) s+=0.5;
      if (this.contentEnd && b.start>0.4*this.contentEnd) s+=1;
      if (s>=bestScore) { best=i; bestScore=s; }
    });
    return best;
  }

  tick = () => {
    const a=this.audio;
    if (a && !a.paused) {
      const dur=isFinite(a.duration)?a.duration:0;
      if (!this.state.duration&&dur) this.setState({duration:dur});
      if (dur) a.volume=1-Math.min(1,Math.max(0,(a.currentTime-(dur-1)))); // volume fade every frame
      // Throttle React re-render + postMessage to ~FPS (drift/caption fades stay smooth)
      const now = performance.now();
      if (!this._lastTick || now - this._lastTick >= 1000/FPS) {
        this._lastTick = now;
        this.setState({t:a.currentTime});
        if (IS_IFRAME) window.parent.postMessage({type:'audiogram-time',t:a.currentTime,duration:dur,playing:true},'*');
      }
    }
    this._raf=requestAnimationFrame(this.tick);
  };

  audioRef = (el) => {
    if (!el||el===this.audio) return; this.audio=el;
    el.addEventListener('loadedmetadata', ()=>this.setState({duration:el.duration||0}));
    el.addEventListener('play', ()=>{ this.setState({playing:true,started:true}); if(IS_IFRAME) window.parent.postMessage({type:'audiogram-time',t:el.currentTime,duration:el.duration||0,playing:true},'*'); });
    el.addEventListener('pause', ()=>{ this.setState({playing:false}); if(IS_IFRAME) window.parent.postMessage({type:'audiogram-time',t:el.currentTime,duration:el.duration||0,playing:false},'*'); });
    el.addEventListener('ended', ()=>this.setState({playing:false}));
  };

  activeBlock() {
    const t=this.state.t+SYNC_LEAD, bs=this.blocks||[]; let idx=-1;
    for (let i=0;i<bs.length;i++) { if(bs[i].start<=t) idx=i; else break; }
    return idx>=0?bs[idx]:null;
  }

  panel(way) {
    const w=this.ways[way], DS=window.MoreMuslimDesignSystem_019df4||{};
    this._pc=this._pc||{};
    if (!w) return <div style={{position:'absolute',inset:0,background:'#FBF2E9'}} />;
    if (w.isImage) {
      const {imgZoom:z,imgCropX:cx,imgCropY:cy,imgOpacity:op=1}=this.state.cfg, key=`img:${way}:${z}:${cx}:${cy}:${op}`;
      if (!this._pc[key]) this._pc[key]=<img src={w.image} alt="" style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',objectPosition:`${cx}% ${cy}%`,transform:`scale(${z})`,transformOrigin:`${cx}% ${cy}%`,opacity:op}} />;
      return this._pc[key];
    }
    if (DS.PatternPanel) {
      const key=`pat:${way}`;
      if (!this._pc[key]) { const PP=DS.PatternPanel; this._pc[key]=<PP tile={w.tile} color={w.bg} grain grainOpacity={w.grain} tileOpacity={w.tileOpacity} radius="0" style={{position:'absolute',inset:0,height:'100%'}} />; }
      return this._pc[key];
    }
    return <div style={{position:'absolute',inset:0,background:w.bg}} />;
  }

  groundLayer(way, opacity, key) {
    const w=this.ways[way]||this.ways.beige, t=this.state.t, cfg=this.state.cfg;
    // Slow push-in scaled to the clip's actual length — perceptible but calm.
    const total=Math.max(1, this.state.duration || ((this.contentEnd||0)+(cfg.outroDuration||5)));
    const p=clamp01(t/total), motion=cfg.bgDrift!==false;
    const scale = w.isImage ? (motion ? 1.02+0.08*p : 1.02) : (motion ? 1.08+0.04*p : 1.08);
    const ty = (w.isImage && motion) ? -12*p : 0;
    // Pattern tile breathes with the voice (opacity only — the ground colour stays solid).
    const breathe = cfg.breathe!==false && !w.isImage && !cfg.solidBg;
    const patOp = breathe ? 0.55+0.45*this.env(t) : 1;
    // Living grain: the noise tile jumps to a new deterministic offset every frame.
    const f=Math.floor(t*FPS), lightGround=(w.ink==='#511C14'||w.ink==='#192136');
    const gx=Math.round(frand(f)*280), gy=Math.round(frand(f+9173)*280);
    return (
      <div key={key} style={{position:'absolute',inset:0,background:w.bg,opacity}}>
        <div style={{position:'absolute',inset:0,transform:`scale(${scale}) translateY(${ty}px)`,transformOrigin:'center',willChange:'transform'}}>
          {(cfg.solidBg && !w.isImage) ? null :
            (breathe ? <div style={{position:'absolute',inset:0,opacity:patOp}}>{this.panel(way)}</div> : this.panel(way))}
        </div>
        {w.isImage && cfg.illusTint && <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,rgba(8,10,18,0.42) 0%,rgba(8,10,18,0.30) 42%,rgba(8,10,18,0.66) 100%)'}} />}
        {cfg.paperTexture!==false && <div style={{position:'absolute',inset:0,backgroundImage:`url("${lightGround?PAPER_DARK:PAPER_LIGHT}")`,backgroundSize:'520px 520px',backgroundPosition:`${(t*4)%520}px ${(t*2.5)%520}px`,opacity:lightGround?0.045:0.06,pointerEvents:'none'}} />}
        <div style={{position:'absolute',inset:0,backgroundImage:`url("${lightGround?GRAIN_DARK:GRAIN_LIGHT}")`,backgroundSize:'280px 280px',backgroundPosition:`${gx}px ${gy}px`,opacity:lightGround?0.05:0.07,pointerEvents:'none'}} />
      </div>
    );
  }

  buildCaption(ink, accent, isHi) {
    const active=this.activeBlock(); if (!active) return null;
    const {cfg}=this.state, motion=cfg.wordMotion, t=this.state.t+SYNC_LEAD;
    const size = isHi ? (cfg.captionSize==='M'?62:82) : (cfg.captionSize==='M'?48:69);
    const spans=[];
    const words=active.words;
    words.forEach((w,i)=>{
      const op=motion==='fade'?clamp01((t-w.start)/0.18):(t>=w.start?1:0);
      if (op<=0) return;
      // The word being spoken carries the accent colour, then settles back to ink
      // over 0.3s once the next word lands.
      const nxt = i<words.length-1 ? words[i+1].start : active.end;
      const color = cfg.wordAccent===false ? ink : hexMix(accent, ink, clamp01((t-nxt)/0.3));
      spans.push(<span key={i} style={{display:'inline-block',opacity:op,transform:`translateY(${(1-op)*10}px)`,marginRight:'0.28em',color}}>{w.text}</span>);
    });
    return (
      <div style={{color:ink, width:isHi?'100%':'auto', textAlign:isHi?'center':'left'}}>
        {cfg.showSpeakerLabel && !isHi && <div style={{fontSize:32,textTransform:'uppercase',letterSpacing:'0.165em',marginBottom:28,color:accent}}>{this.firstName(active.speaker)}</div>}
        <div style={{fontSize:size,lineHeight:1.06,fontStyle:isHi?'italic':'normal',maxWidth:isHi?880:900,margin:isHi?'0 auto':0}}>{spans}</div>
      </div>
    );
  }

  outroStart() {
    const dur=this.state.duration||0; if (!dur) return Infinity;
    return Math.max((this.contentEnd||0)+0.3, dur-(this.state.cfg.outroDuration||5));
  }
  fmt(s) { s=Math.max(0,Math.floor(s||0)); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
  togglePlay=()=>{ const a=this.audio; if(!a) return; if(a.paused) a.play(); else a.pause(); };
  restart=()=>{ const a=this.audio; if(!a) return; a.currentTime=0; a.volume=1; a.play(); this.setState({t:0,started:true}); };
  seek=(e)=>{ const v=+e.target.value; if(this.audio) this.audio.currentTime=v; this.setState({t:v,started:true}); };

  // Fetch a same-origin asset and cache it as a data URI (reused across every frame).
  _inline = async (url) => {
    this._inlineCache = this._inlineCache || {};
    if (this._inlineCache[url]) return this._inlineCache[url];
    const blob = await (await fetch(url)).blob();
    const data = await new Promise((res, rej) => { const fr = new FileReader(); fr.onerror = rej; fr.onload = () => res(fr.result); fr.readAsDataURL(blob); });
    this._inlineCache[url] = data; return data;
  };

  // Snapshot the live 1080×1920 frame to a W×H canvas via an SVG <foreignObject>.
  // All <img> and CSS background images are inlined as data URIs so the SVG rasterises offline.
  _snapshot = async (W, H) => {
    const clone = this.frame.cloneNode(true);
    clone.style.transform = 'none'; clone.style.margin = '0';
    for (const img of clone.querySelectorAll('img')) {
      const s = img.getAttribute('src');
      if (s && !s.startsWith('data:')) img.setAttribute('src', await this._inline(new URL(s, location.href).href));
    }
    for (const el of [clone, ...clone.querySelectorAll('*')]) {
      const bg = el.style && el.style.backgroundImage;
      const m = bg && bg.includes('url(') && bg.match(/url\(["']?([^"')]+)["']?\)/);
      if (m && !m[1].startsWith('data:')) el.style.backgroundImage = `url("${await this._inline(new URL(m[1], location.href).href)}")`;
    }
    clone.setAttribute('xmlns', 'http://www.w3.org/1999/xhtml');
    const xml = new XMLSerializer().serializeToString(clone);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 1080 1920"><foreignObject x="0" y="0" width="1080" height="1920">${xml}</foreignObject></svg>`;
    const img = await new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = () => rej(new Error('frame render failed')); i.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg); });
    const canvas = this._exportCanvas || (this._exportCanvas = document.createElement('canvas'));
    if (canvas.width !== W) canvas.width = W;
    if (canvas.height !== H) canvas.height = H;
    canvas.getContext('2d').drawImage(img, 0, 0, W, H);
    return canvas;
  };

  // Offline 1080p (1080×1920) H.264 export. Each frame is rendered deterministically from
  // state.t, snapshotted to a canvas, and encoded via WebCodecs into an MP4.
  exportVideo = async () => {
    if (this.state.exporting) return;
    if (typeof VideoEncoder === 'undefined' || !window.Mp4Muxer) {
      const m = 'MP4 export needs a Chromium browser with WebCodecs (Chrome or Edge).';
      if (IS_IFRAME) window.parent.postMessage({ type:'audiogram-export-error', message:m }, '*'); else alert(m);
      return;
    }
    this._inlineCache = {}; // re-inline assets fresh for this export
    const fps = FPS, W = 1080, H = 1920;
    const a = this.audio;
    const audioDur = a && isFinite(a.duration) && a.duration ? a.duration : 0;
    const total = Math.max((this.contentEnd || 0) + (this.state.cfg.outroDuration || 5), audioDur);
    const totalFrames = Math.max(1, Math.ceil(total * fps));
    const wasStarted = this.state.started;
    if (a && !a.paused) a.pause();

    // Decode the source audio up front so we can mux an AAC track alongside the video.
    let audioBuf = null;
    if (this.state.cfg.audioSrc && this.state.cfg.audioSrc !== 'pending') {
      try {
        const buf = await (await fetch(this.state.cfg.audioSrc)).arrayBuffer();
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        audioBuf = await ac.decodeAudioData(buf);
        ac.close();
        // Reuse this decode for the breathing envelope so export frames match playback.
        if (!this._env || this._envSrc !== this.state.cfg.audioSrc) {
          this._env = this._envFromBuffer(audioBuf);
          this._envSrc = this.state.cfg.audioSrc;
        }
      } catch (e) { console.warn('Audio decode failed — exporting silent video.', e); }
    }

    const { Muxer, ArrayBufferTarget } = window.Mp4Muxer;
    const muxer = new Muxer({
      target: new ArrayBufferTarget(),
      video: { codec: 'avc', width: W, height: H, frameRate: fps },
      ...(audioBuf ? { audio: { codec: 'aac', sampleRate: audioBuf.sampleRate, numberOfChannels: Math.min(2, audioBuf.numberOfChannels) } } : {}),
      fastStart: 'in-memory',
    });
    const venc = new VideoEncoder({ output: (c, m) => muxer.addVideoChunk(c, m), error: e => console.error('VideoEncoder', e) });
    venc.configure({ codec: 'avc1.640028', width: W, height: H, bitrate: 12_000_000, framerate: fps });

    ReactDOM.flushSync(() => this.setState({ exporting: true, exportPct: 0, started: true, duration: total }));
    try {
      for (let f = 0; f < totalFrames; f++) {
        const t = f / fps;
        ReactDOM.flushSync(() => this.setState({ t })); // commit this frame's DOM synchronously
        const canvas = await this._snapshot(W, H);       // image-load await yields each frame (works backgrounded, unlike rAF)
        const frame = new VideoFrame(canvas, { timestamp: Math.round(t * 1e6), duration: Math.round(1e6 / fps) });
        venc.encode(frame, { keyFrame: f % (fps * 2) === 0 });
        frame.close();
        if (f % 3 === 0) { const pct = Math.round((f / totalFrames) * 100); this.setState({ exportPct: pct }); if (IS_IFRAME) window.parent.postMessage({ type:'audiogram-export-progress', pct }, '*'); }
        while (venc.encodeQueueSize > 8) await new Promise(r => setTimeout(r, 0));
      }
      await venc.flush();

      if (audioBuf) {
        try {
          const ch = Math.min(2, audioBuf.numberOfChannels), sr = audioBuf.sampleRate, len = audioBuf.length;
          const aenc = new AudioEncoder({ output: (c, m) => muxer.addAudioChunk(c, m), error: e => console.error('AudioEncoder', e) });
          aenc.configure({ codec: 'mp4a.40.2', sampleRate: sr, numberOfChannels: ch, bitrate: 160_000 });
          const inter = new Float32Array(len * ch); // interleaved f32 for WebCodecs AudioData
          for (let c = 0; c < ch; c++) { const d = audioBuf.getChannelData(c); for (let i = 0; i < len; i++) inter[i * ch + c] = d[i]; }
          const CHUNK = 8192;
          for (let off = 0; off < len; off += CHUNK) {
            const n = Math.min(CHUNK, len - off);
            const ad = new AudioData({ format: 'f32', sampleRate: sr, numberOfFrames: n, numberOfChannels: ch, timestamp: Math.round((off / sr) * 1e6), data: inter.subarray(off * ch, (off + n) * ch) });
            aenc.encode(ad); ad.close();
          }
          await aenc.flush(); aenc.close();
        } catch (e) { console.warn('Audio encode failed — video saved without sound.', e); }
      }

      muxer.finalize();
      const blob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url; link.download = 'moremuslim-audiogram.mp4';
      document.body.appendChild(link); link.click(); link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 10_000);
      if (IS_IFRAME) window.parent.postMessage({ type:'audiogram-export-done' }, '*');
    } catch (e) {
      console.error('Export failed', e);
      if (IS_IFRAME) window.parent.postMessage({ type:'audiogram-export-error', message:e.message }, '*'); else alert('Export failed: ' + e.message);
    } finally {
      try { if (venc.state !== 'closed') venc.close(); } catch {}
      ReactDOM.flushSync(() => this.setState({ exporting: false, exportPct: 0, started: wasStarted, t: 0, duration: audioDur }));
    }
  };

  render() {
    this.ensureParsed();
    const {cfg,t,scale,playing,exporting,exportPct}=this.state;
    const active=this.activeBlock();
    const gs=this.groundState();
    const hi=this.highlightIndex();
    const isHi = hi>=0 && active && (this.blocks||[]).indexOf(active)===hi;

    const os=this.outroStart();
    const oProg=isFinite(os)?clamp01((t-os)/0.6):0;
    // Outro elements fade in one after another (fade only, no movement).
    const oFade=(d)=>isFinite(os)?clamp01((t-(os+d))/0.5):0;
    let outroWay=cfg.outroWay;
    if (outroWay==='carry') { const lb=this.blocks&&this.blocks[this.blocks.length-1]; outroWay=(lb&&this.guest&&lb.speaker===this.guest)?cfg.guestWay:cfg.hostWay; }
    const ow=this.ways[outroWay]||this.ways.night;
    const symSrc=`../../assets/logos/symbol-${ow.logo}.svg`;
    const dur=this.state.duration||((this.contentEnd||0)+cfg.outroDuration)||1;

    // All colours/opacities are inline (not CSS variables) so the export snapshot —
    // which clones only the frame — renders identically to the live preview.
    const chromeOp=(1-oProg)*(isHi?0.35:1); // eyebrow/footer recede during the highlight set piece
    // Gate weave: slow filmic wander of the whole frame + a whisper of exposure flicker.
    const fIdx=Math.floor(t*FPS), weave=cfg.gateWeave!==false;
    const wx=weave?Math.sin(t*0.9+1.7)*2.2+(frand(fIdx*3+11)*2-1)*0.5:0;
    const wy=weave?Math.cos(t*0.7+0.4)*2.2+(frand(fIdx*3+77)*2-1)*0.5:0;
    const wr=weave?Math.sin(t*0.5+2.6)*0.05:0;
    const flick=weave?frand(fIdx+301)*0.02:0;
    // Text zoom: a slow push on the live sentence; stronger arc on the highlight.
    let zScale=1;
    if (cfg.textZoom!==false && active) {
      const bp=clamp01((t+SYNC_LEAD-active.start)/Math.max(1.2,(active.end-active.start)||1.2));
      zScale=isHi?0.98+0.10*bp:1+0.035*bp;
    }

    const btn={background:'#232d45',color:'#e9edf5',border:'1px solid #2e3a55',borderRadius:6,padding:'7px 12px',cursor:'pointer',font:'13px -apple-system,sans-serif'};
    return (
      <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:IS_IFRAME?0:14,padding:IS_IFRAME?0:20,fontFamily:"'ABC Marist','Iowan Old Style',Georgia,serif"}}>
        <div style={{position:'relative',width:1080*scale,height:1920*scale,flexShrink:0,boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
          <div ref={el=>this.frame=el} style={{position:'absolute',top:0,left:0,width:1080,height:1920,transform:`scale(${scale})`,transformOrigin:'top left',overflow:'hidden',background:'#000',fontFamily:"'ABC Marist','Iowan Old Style',Georgia,serif",lineHeight:1}}>
            <div style={{position:'absolute',inset:0,transform:`translate(${wx.toFixed(2)}px,${wy.toFixed(2)}px) rotate(${wr.toFixed(3)}deg) scale(1.006)`,transformOrigin:'center'}}>
              <div style={{position:'absolute',inset:0}}>
                {gs.k<1 && this.groundLayer(gs.prev,1,'g-prev')}
                {this.groundLayer(gs.cur,gs.k,'g-cur')}
              </div>
              <div style={{position:'absolute',top:370,left:0,right:0,textAlign:'center',fontSize:32,textTransform:'uppercase',letterSpacing:'0.165em',whiteSpace:'nowrap',padding:'0 60px',color:gs.ink,opacity:chromeOp}}>{cfg.episodeEyebrow}</div>
              <div style={{position:'absolute',left:86,right:86,top:460,bottom:460,display:'flex',flexDirection:'column',justifyContent:isHi?'center':'flex-start',alignItems:isHi?'center':'flex-start',pointerEvents:'none',transform:`scale(${zScale.toFixed(4)})`,transformOrigin:isHi?'50% 50%':'0% 22%'}}>
                {this.buildCaption(gs.ink,gs.accent,isHi)}
              </div>
              <div style={{position:'absolute',bottom:370,left:0,right:0,textAlign:'center',fontSize:32,textTransform:'uppercase',letterSpacing:'0.165em',whiteSpace:'nowrap',color:gs.ink,opacity:chromeOp}}>MOREMUSLIM.ORG</div>
              {oProg>0 && (
                <div style={{position:'absolute',inset:0,opacity:oProg,pointerEvents:oProg>0.5?'auto':'none'}}>
                  <div style={{position:'absolute',inset:0}}>{this.groundLayer(outroWay,1,'outroG')}</div>
                  <div style={{position:'relative',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:'0 130px',color:ow.ink}}>
                    <div style={{fontSize:56,textTransform:'uppercase',letterSpacing:'0.165em',lineHeight:1.16,opacity:oFade(0.15)}}>{cfg.outroEpisode}<br/>Now Streaming</div>
                    <div style={{marginTop:140,fontSize:48,maxWidth:860,lineHeight:1.18,opacity:oFade(0.55)}}>{cfg.outroLine1}</div>
                    <div style={{marginTop:90,fontSize:48,maxWidth:860,lineHeight:1.24,opacity:oFade(0.95)}}>{cfg.outroLine2}</div>
                    <img src={symSrc} alt="" style={{width:190,height:190,marginTop:150,opacity:oFade(1.35)}} />
                  </div>
                </div>
              )}
            </div>
            {flick>0 && <div style={{position:'absolute',inset:0,background:'#fff',opacity:flick.toFixed(3),pointerEvents:'none'}} />}
          </div>
        </div>
        {!IS_IFRAME && (
          <div style={{display:'flex',alignItems:'center',gap:12,color:'#cdd3e0',font:'13px/1.3 -apple-system,sans-serif',width:Math.min(640,1080*scale)}}>
            <button onClick={this.togglePlay} disabled={exporting} style={{...btn,whiteSpace:'nowrap',opacity:exporting?0.5:1}}>{playing?'❚❚ Pause':'▶ Play'}</button>
            <button onClick={this.restart} disabled={exporting} style={{...btn,opacity:exporting?0.5:1}}>↺ Restart</button>
            <button onClick={this.exportVideo} disabled={exporting} title="Render a 1080×1920 H.264 MP4" style={{...btn,background:'#3a2018',borderColor:'#5a3528',color:'#F6E1C6',whiteSpace:'nowrap'}}>{exporting?`Rendering ${exportPct}%`:'⬇ MP4'}</button>
            <input type="range" min={0} max={dur} step={0.01} value={t} onInput={this.seek} disabled={exporting} style={{flex:1,accentColor:'#9FBCCC'}} />
            <span style={{fontVariantNumeric:'tabular-nums',minWidth:80,textAlign:'right'}}>{this.fmt(t)} / {this.fmt(dur)}</span>
          </div>
        )}
        <audio ref={this.audioRef} src={(cfg.audioSrc && cfg.audioSrc!=='pending') ? cfg.audioSrc : undefined} preload="auto" />
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<AudiogramPlayer />);
</script>
</body>
</html>
