<script type="text/babel">

const STUDIO = IS_BUNDLE ? 'ui_kits/social/index.html' : 'index.html';

const EPISODES = [
  { e:'1', title:'Side Entrances',              img:`${IMGS}illus-ep1.jpg`, thumb:`${IMGS}illus-ep1.jpg`,  eyebrow:'SIDE ENTRANCES',            outroLine1:'Listen to the full episode at moremuslim.org.', outroLine2:'Or search for “More Muslim” on Apple Podcasts, Spotify, or wherever you listen.' },

  { e:'3', title:'The Secret Translators',      img:`${IMGS}illus-ep3.jpg`, thumb:`${IMGS}illus-ep3.jpg`,  eyebrow:'THE SECRET TRANSLATORS',    outroLine1:'Listen to the full episode at moremuslim.org.', outroLine2:'Or search for “More Muslim” on Apple Podcasts, Spotify, or wherever you listen.' },
  { e:'4', title:'A Recitation Revolution',     img:`${IMGS}illus-ep4.jpg`, thumb:`${IMGS}illus-ep4.jpg`,  eyebrow:'A RECITATION REVOLUTION',   outroLine1:'Listen to the full episode at moremuslim.org.', outroLine2:'Or search for “More Muslim” on Apple Podcasts, Spotify, or wherever you listen.' },
  { e:'5', title:'Hanabneehu',                  img:`${IMGS}illus-ep5.jpg`, thumb:`${IMGS}illus-ep5.jpg`,  eyebrow:'HANABNEEHU',                outroLine1:'Listen to the full episode at moremuslim.org.', outroLine2:'Or search for “More Muslim” on Apple Podcasts, Spotify, or wherever you listen.' },
  { e:'6', title:'Cape Malay',                  img:`${IMGS}illus-ep6.jpg`, thumb:`${IMGS}illus-ep6.jpg`,  eyebrow:'CAPE MALAY',                outroLine1:'Listen to the full episode at moremuslim.org.', outroLine2:'Or search for “More Muslim” on Apple Podcasts, Spotify, or wherever you listen.' },
  { e:'7', title:'In Therapy, With SheikhaGPT', img:`${IMGS}illus-ep7.jpg`, thumb:`${IMGS}illus-ep7.jpg`,  eyebrow:'IN THERAPY, WITH SHEIKHAGPT', outroLine1:'Listen to the full episode at moremuslim.org.', outroLine2:'Or search for “More Muslim” on Apple Podcasts, Spotify, or wherever you listen.' },
  { e:'8', title:'The Travelling Sisterhood',   img:`${IMGS}illus-ep8.jpg`, thumb:`${IMGS}illus-ep8.jpg`,  eyebrow:'THE TRAVELLING SISTERHOOD', outroLine1:'Listen to the full episode at moremuslim.org.', outroLine2:'Or search for “More Muslim” on Apple Podcasts, Spotify, or wherever you listen.' },
  { e:'9', title:'A More Muslim Japan',         img:`${IMGS}illus-ep9.jpg`, thumb:`${IMGS}illus-ep9.jpg`,  eyebrow:'A MORE MUSLIM JAPAN',       outroLine1:'Listen to the full episode at moremuslim.org.', outroLine2:'Or search for “More Muslim” on Apple Podcasts, Spotify, or wherever you listen.' },
  { e:'10', title:'The Women Who Wash Our Dead', img:`${IMGS}illus-ep10.jpg`, thumb:`${IMGS}illus-ep10.jpg`, eyebrow:'THE WOMEN WHO WASH OUR DEAD', outroLine1:'Listen to the full episode at moremuslim.org.', outroLine2:'Or search for “More Muslim” on Apple Podcasts, Spotify, or wherever you listen.' },
];

const COLORWAYS = [
  { key:'night',      name:'Night Blue',      bg:'#192136', ink:'#F6E1C6', hex:'#192136' },
  { key:'oak',        name:'Oak Brown',       bg:'#511C14', ink:'#F6E1C6', hex:'#511C14' },
  { key:'beige',      name:'Ivory Beige',     bg:'#FBF2E9', ink:'#511C14', hex:'#FBF2E9' },
  { key:'harvest',    name:'Harvest Yellow',  bg:'#E2B16D', ink:'#511C14', hex:'#E2B16D' },
  { key:'terracotta', name:'Terracotta',      bg:'#C15A3A', ink:'#F6E1C6', hex:'#C15A3A' },
  { key:'mist',       name:'Mist Blue',       bg:'#9FBCCC', ink:'#192136', hex:'#9FBCCC' },
  { key:'coastal',    name:'Coastal Blue',    bg:'#6185A3', ink:'#F6E1C6', hex:'#6185A3' },
  { key:'stone',      name:'Stone Blue',      bg:'#3C5065', ink:'#F6E1C6', hex:'#3C5065' },
  { key:'black',      name:'Black',           bg:'#000000', ink:'#FBF2E9', hex:'#000000' },
];

// Ground colourway → official ZAINA star-lattice tile, matching PatternPanel.jsx's GROUND_TILE.
const GROUND_TILE = {
  beige:'6a', harvest:'3a', terracotta:'5b', oak:'6b',
  mist:'2b', coastal:'6c', stone:'1b', night:'5c', black:'5c',
};

const LAYOUTS = [
  { key:'cover',     name:'Cover',     isStory:false, desc:'Large title, illustration background, symbol' },
  { key:'quote',     name:'Quote',     isStory:true,  desc:'Two speakers, one exchange each — story format' },
  { key:'synopsis',  name:'Synopsis',  isStory:false, desc:'Episode description in large type' },
  { key:'streaming', name:'Streaming', isStory:true,  desc:'Now Streaming with platform links — story format' },
  { key:'credits',   name:'Credits',   isStory:false, desc:'Team and contributor credits list' },
];

const THUMB_H = 200;
const SAMPLE_IMG = `${IMGS}illus-ep1.jpg`;
function PostThumb({ layout, epImg }) {
  const S = window.MMSocial;
  if (!S) return <div style={{width:140,height:THUMB_H,background:'#192136',opacity:0.3}}/>;
  const isStory = layout === 'quote' || layout === 'streaming';
  const format = isStory ? 'story' : 'portrait';
  const { w, h } = S.SIZES[format];
  const scale = THUMB_H / h;
  const displayW = Math.round(w * scale);
  const way = layout === 'quote' ? 'oak' : 'night';
  const ep7 = 'In Therapy, With SheikhaGPT';
  let content = null;
  switch(layout) {
    case 'cover':
      content = <S.CoverPost format={format} way={way} image={SAMPLE_IMG} scale={scale}
        presents="More Muslim presents" title="Side Entrances" episode="S1 · E1" />;
      break;
    case 'quote':
      content = <S.QuotePost format={format} way={way} scale={scale} episode={ep7}
        exchanges={[{speaker:'Yassmin',text:'Do you remember the first time you heard about this?'},{speaker:'Dr. Rania',text:'Yeah — a patient told me between our sessions.'}]} />;
      break;
    case 'synopsis':
      content = <S.SynopsisPost format={format} way={way} image={SAMPLE_IMG} scale={scale} episode={ep7}
        paragraphs={['When a patient starts using ChatGPT as a therapist, a reporter investigates.','What does it mean when an AI becomes your spiritual guide?']} />;
      break;
    case 'streaming':
      content = <S.NowStreamingPost format={format} way={way} scale={scale} episode="Episode 7"
        lines={['Listen at moremuslim.org or wherever you get podcasts.']} />;
      break;
    case 'credits':
      content = <S.CreditsPost format={format} way={way} scale={scale} episode="S1 · E7"
        credits={[{name:'Yassmin Abdel-Magied',title:'Reporter'},{name:'Taqwa Sadiq',title:'Producer'},{name:'Sarah Qari',title:'Story Editor'},{name:'Alexander Overington',title:'Composer'},{name:'Amel Mukhtar',title:'Exec. Producer'}]} />;
      break;
  }
  return (
    <div style={{width:displayW,height:THUMB_H,overflow:'hidden',position:'relative',flexShrink:0}}>
      {content}
    </div>
  );
}

function buildEpisodePostSet(ep, synopsisText, creditsText) {
  const n = ep.e, coverEp = `S1 · E${n}`;
  const paras = (synopsisText||'').split(/\n\s*\n/).map(s=>s.trim()).filter(Boolean);
  const mid = Math.max(1, Math.ceil(paras.length/2));
  const toP = (arr)=>({ p1: arr[0]||'', p2: arr.slice(1).join('<br><br>')||'' });
  const creditsArr = (creditsText||'').split(/\n/).map(s=>s.trim()).filter(Boolean).map(line=>{
    const m = line.match(/^(.*?)\s*[—:|\-]\s*(.+)$/);
    return m ? { name:m[1].trim(), title:m[2].trim() } : { name:line, title:'' };
  });
  const mk = (tpl, way, image, cropX, cropY, cropZoom, patch) => ({ tpl, way, format:'portrait', image, cropX, cropY, cropZoom, pattern:true, content:{ [tpl]: patch } });
  return [
    mk('cover',     'night', ep.img, 50, 50, 1,    { presents:'More Muslim presents', title: ep.title, episode: coverEp }),
    mk('synopsis',  'beige', null,   50, 50, 1,    { episode: ep.title, ...toP(paras.slice(0,mid)) }),
    mk('synopsis',  'beige', null,   50, 50, 1,    { episode: ep.title, ...toP(paras.slice(mid)) }),
    mk('credits',   'night', ep.img, 100, 0, 1.5,  { episode: coverEp, credits: creditsArr }),
    mk('streaming', 'night', ep.img, 100, 100, 1.5,{ episode:`Episode ${n}`, l1:'Listen to the full episode on moremuslim.org.', l2:'Or search “More Muslim” wherever you get podcasts.' }),
  ];
}

function buildPrefill(state) {
  const { format, epMode, epIdx, bgType, bgChoice, layout, srtText } = state;
  const ep = epMode === 'specific' && epIdx !== null ? EPISODES[epIdx] : null;
  const coverEp = ep ? `S1 · E${ep.e}` : '';
  const outroEp = ep ? `EPISODE ${ep.e}` : '';
  let way = 'night', image = null;
  if (bgType === 'pattern' || bgType === 'solid') way = bgChoice;
  else { image = bgChoice; way = 'night'; }
  const isStory = layout === 'quote' || layout === 'streaming';
  return {
    tpl: format === 'audiogram' ? 'audiogram' : layout,
    way, image,
    pattern: bgType !== 'solid',
    format: format === 'audiogram' ? 'story' : (isStory ? 'story' : 'portrait'),
    content: {
      cover:    { presents:'More Muslim presents', title:ep?.title||'', episode:coverEp },
      quote:    { episode:outroEp ? `${outroEp}: ${ep?.title||''}` : '', s1:'', t1:'', s2:'', t2:'' },
      synopsis: { episode:ep?.title||'', p1:'', p2:'' },
      streaming:{ episode:outroEp, l1:'Listen to the full episode at moremuslim.org.', l2:'Or search “More Muslim” wherever you listen.' },
      credits:  { episode:coverEp, body:'' },
      audiogram:{
        guestWay:'oak',
        episodeEyebrow: ep?.eyebrow || (ep?.title?.toUpperCase()||''),
        highlight:'auto',
        outroEpisode: outroEp,
        outroLine1: ep?.outroLine1||'Listen to the full episode at moremuslim.org.',
        outroLine2: ep?.outroLine2||'Or search for “More Muslim” on Apple Podcasts, Spotify, or wherever you listen.',
        srt: srtText||'',
      }
    }
  };
}

function Wizard() {
  const [format,    setFormat]    = React.useState(null);
  const [postType,  setPostType]  = React.useState(null);
  const [synopsisText, setSynopsisText] = React.useState('');
  const [creditsText,  setCreditsText]  = React.useState('');
  const [epMode,    setEpMode]    = React.useState(null);
  const [epIdx,     setEpIdx]     = React.useState(null);
  const [bgType,    setBgType]    = React.useState('pattern');
  const [bgChoice,  setBgChoice]  = React.useState('night');
  const [layout,    setLayout]    = React.useState('cover');
  const [audioFile, setAudioFile] = React.useState(null);
  const [srtFile,   setSrtFile]   = React.useState(null);
  const [srtText,   setSrtText]   = React.useState('');
  const [audioDrag, setAudioDrag] = React.useState(false);
  const [srtDrag,   setSrtDrag]   = React.useState(false);
  const audioRef = React.useRef(), srtRef = React.useRef();

  const steps = React.useMemo(() => {
    if (format === 'audiogram') return ['format','episode','background','audio','ready'];
    if (format === 'static') {
      if (postType === 'episode')  return ['format','posttype','episode','synopsis','credits','ready'];
      if (postType === 'quote')    return ['format','posttype','episode','background','ready'];
      if (postType === 'assorted') return ['format','posttype','episode','background','layout','ready'];
      return ['format','posttype'];
    }
    return ['format','episode','background','layout','ready'];
  }, [format, postType]);

  const [stepIdx, setStepIdx] = React.useState(0);
  const cur = steps[stepIdx];
  const progress = stepIdx === 0 ? 0 : (stepIdx / (steps.length - 1)) * 100;
  const ep = epMode === 'specific' && epIdx !== null ? EPISODES[epIdx] : null;

  const epRequired = postType === 'episode';
  const canNext = { format:!!format, posttype:!!postType, episode: epRequired ? (epMode==='specific'&&epIdx!==null) : (epMode==='general'||(epMode==='specific'&&epIdx!==null)), background:true, layout:true, audio:true, synopsis: synopsisText.trim().length>0, credits:true, ready:true };

  const handleAudio = (file) => { if (file && file.type.startsWith('audio')) setAudioFile(file); };
  const handleSrt   = async (file) => { if (!file) return; setSrtFile(file); setSrtText(await file.text()); };

  const selectFormat = (f) => { setFormat(f); setTimeout(() => setStepIdx(1), 160); };
  const selectPostType = (pt) => { setPostType(pt); setTimeout(() => setStepIdx(2), 160); };
  const bgDefault = { pattern:'night', illustration: ep?.img || EPISODES[0].img };

  const launch = async () => {
    let pf;
    if (format === 'static' && postType === 'episode' && ep) {
      pf = { slides: buildEpisodePostSet(ep, synopsisText, creditsText) };
    } else {
      pf = buildPrefill({ format, epMode, epIdx, bgType, bgChoice, layout: postType==='quote'?'quote':layout, srtText });
    }
    try { localStorage.setItem('mm-studio-prefill', JSON.stringify(pf)); } catch {}
    if (format === 'audiogram') {
      const ac = pf.content.audiogram;
      try { localStorage.setItem('mm-audiogram-cfg', JSON.stringify({ hostWay:pf.way, ...ac, audioSrc:null })); } catch {}
    }
    // Store audio file in IndexedDB so the studio can pick it up
    if (audioFile) {
      try {
        await new Promise((resolve, reject) => {
          const req = indexedDB.open('mm-studio', 1);
          req.onupgradeneeded = e => e.target.result.createObjectStore('files');
          req.onsuccess = e => {
            const db = e.target.result;
            const tx = db.transaction('files', 'readwrite');
            tx.objectStore('files').put(audioFile, 'pending-audio');
            tx.oncomplete = resolve; tx.onerror = reject;
          };
          req.onerror = reject;
        });
      } catch(err) { console.warn('Could not store audio in IndexedDB:', err); }
    }
    window.location.href = STUDIO;
  };

  const next = () => setStepIdx(s => Math.min(steps.length - 1, s + 1));
  const back = () => setStepIdx(s => Math.max(0, s - 1));

  const stepContent = {
    format: (
      <React.Fragment>
        <div className="step-q">What are you making?</div>
        <div className="format-grid">
          <button className={`format-opt${format==='audiogram'?' on':''}`} onClick={()=>selectFormat('audiogram')}>
            <span className="format-check">✓</span>
            <span className="format-name">Audiogram</span>
            <span className="format-desc">A short video clip with word-by-word captions — for Instagram Stories and Reels.</span>
          </button>
          <button className={`format-opt${format==='static'?' on':''}`} onClick={()=>selectFormat('static')}>
            <span className="format-check">✓</span>
            <span className="format-name">Static Post</span>
            <span className="format-desc">A still image for your feed, carousel, or LinkedIn — five layout options to choose from.</span>
          </button>
        </div>
        <div className="nav"><span/><button className="next-btn" disabled={!format} onClick={next}>Continue →</button></div>
      </React.Fragment>
    ),
    posttype: (
      <React.Fragment>
        <div className="step-q">What kind of post?</div>
        <div className="format-grid">
          <button className={`format-opt${postType==='episode'?' on':''}`} onClick={()=>selectPostType('episode')}>
            <span className="format-check">✓</span>
            <span className="format-name">New episode</span>
            <span className="format-desc">A full launch set — cover, two synopsis slides, credits, and a now-streaming outro, auto-laid-out as a carousel.</span>
          </button>
          <button className={`format-opt${postType==='quote'?' on':''}`} onClick={()=>selectPostType('quote')}>
            <span className="format-check">✓</span>
            <span className="format-name">Quote post</span>
            <span className="format-desc">A single pull-quote exchange between two speakers.</span>
          </button>
          <button className={`format-opt${postType==='assorted'?' on':''}`} onClick={()=>selectPostType('assorted')} style={{gridColumn:'span 2'}}>
            <span className="format-check">✓</span>
            <span className="format-name">Single post</span>
            <span className="format-desc">Start from any single layout and build freely.</span>
          </button>
        </div>
        <div className="nav"><button className="back-btn" onClick={back}>← Back</button><button className="next-btn" disabled={!postType} onClick={next}>Continue →</button></div>
      </React.Fragment>
    ),
    synopsis: (
      <React.Fragment>
        <div className="step-q">Share the synopsis.</div>
        <p className="layout-desc-text" style={{marginBottom:20,opacity:0.7}}>Separate paragraphs with a blank line — they'll be split across the two synopsis slides.</p>
        <textarea className="txfield-big" value={synopsisText} onChange={e=>setSynopsisText(e.target.value)} placeholder={`When a patient starts using ChatGPT as a therapist, a reporter investigates.\n\nWhat does it mean when an AI becomes your spiritual guide?`} />
        <div className="nav">
          <button className="back-btn" onClick={back}>← Back</button>
          <button className="next-btn" disabled={!canNext.synopsis} onClick={next}>Continue →</button>
        </div>
      </React.Fragment>
    ),
    credits: (
      <React.Fragment>
        <div className="step-q">Add the credits.</div>
        <p className="layout-desc-text" style={{marginBottom:20,opacity:0.7}}>One person per line, as <strong>Name — Role</strong>. Paste from your episode notes.</p>
        <textarea className="txfield-big" value={creditsText} onChange={e=>setCreditsText(e.target.value)} placeholder={`Rowaida Abdelaziz — Reporter\nHeba Afify — Producer\nSalman Ahad Khan — Story Editor, Sound Designer, and Composer\nJoe Plourde — Mix Engineer\nSohaira Siddiqui — Host`} />
        <div className="nav">
          <button className="back-btn" onClick={back}>← Back</button>
          <button className="next-btn" onClick={next}>Continue →</button>
        </div>
      </React.Fragment>
    ),
    episode: (
      <React.Fragment>
        <div className="step-q">Which episode?</div>
        <div className="ep-list">
          {!epRequired && (
          <div className={`ep-row${epMode==='general'?' on':''}`} onClick={()=>{setEpMode('general');setEpIdx(null);}}>
            <div className="ep-dot"/><div className="ep-num">—</div>
            <div className="ep-title ep-general">General post (no specific episode)</div>
          </div>
          )}
          {EPISODES.map((e,i) => (
            <div key={i} className={`ep-row${epMode==='specific'&&epIdx===i?' on':''}`} onClick={()=>{setEpMode('specific');setEpIdx(i);}}>
              <div className="ep-dot"/><div className="ep-num">E{e.e}</div>
              <div className="ep-title">{e.title}</div>
            </div>
          ))}
        </div>
        <div className="nav">
          <button className="back-btn" onClick={back}>← Back</button>
          <button className="next-btn" disabled={!canNext.episode} onClick={next}>Continue →</button>
        </div>
      </React.Fragment>
    ),
    background: (
      <React.Fragment>
        <div className="step-q">Set the scene.</div>
        <div className="bg-toggle">
          <button className={`bg-tab${bgType==='pattern'?' on':''}`} onClick={()=>{setBgType('pattern');setBgChoice(bgDefault.pattern);}}>Colour pattern</button>
          <button className={`bg-tab${bgType==='solid'?' on':''}`} onClick={()=>{setBgType('solid');setBgChoice(bgDefault.pattern);}}>Solid colour</button>
          <button className={`bg-tab${bgType==='illustration'?' on':''}`} onClick={()=>{setBgType('illustration');setBgChoice(bgDefault.illustration);}}>Episode illustration</button>
        </div>
        {(bgType==='pattern' || bgType==='solid') ? (
          <div className="cw-grid">
            {COLORWAYS.map(c=>{
              const isPattern = bgType==='pattern';
              const tileUrl = isPattern ? `${PATTERNS}pattern-${GROUND_TILE[c.key]}.png` : null;
              return (
                <div key={c.key}
                  className={`cw-opt${bgChoice===c.key?' on':''}${isPattern?' is-pattern':''}`}
                  style={isPattern ? {backgroundColor:c.bg, backgroundImage:`url("${tileUrl}")`} : {background:c.bg,color:c.ink}}
                  onClick={()=>setBgChoice(c.key)}>
                  <span className="cw-check" style={isPattern?undefined:{color:c.ink}}>✓</span>
                  <span className="cw-name">{c.name}</span>
                  <span className="cw-hex" style={isPattern?undefined:{color:c.ink}}>{c.hex}</span>
                </div>
              );
            })}
          </div>
        ) : (
          <div className="img-grid">
            {EPISODES.map((e,i)=>(
              <div key={i} className={`img-opt${e.thumb&&bgChoice===e.img?' on':''}${e.thumb?'':' is-empty'}`} onClick={()=>e.thumb&&setBgChoice(e.img)}>
                {e.thumb ? <img src={e.thumb} alt={e.title} loading="lazy"/> : <div className="img-opt-placeholder">No illustration yet</div>}
                <div className="img-opt-label">E{e.e} — {e.title}</div>
              </div>
            ))}
          </div>
        )}
        <div className="nav">
          <button className="back-btn" onClick={back}>← Back</button>
          <button className="next-btn" onClick={next}>Continue →</button>
        </div>
      </React.Fragment>
    ),
    layout: (
      <React.Fragment>
        <div className="step-q">Choose a layout.</div>
        <div className="layout-grid">
          {LAYOUTS.map(l=>(
            <div key={l.key} className={`layout-opt${layout===l.key?' on':''}`} onClick={()=>setLayout(l.key)}>
              <div className="layout-thumb-wrap"><PostThumb layout={l.key} epImg={ep?.thumb}/></div>
              <div className="layout-label">{l.name}</div>
            </div>
          ))}
        </div>
        <p className="layout-desc-text">{LAYOUTS.find(l=>l.key===layout)?.desc}</p>
        <div className="nav">
          <button className="back-btn" onClick={back}>← Back</button>
          <button className="next-btn" onClick={next}>Continue →</button>
        </div>
      </React.Fragment>
    ),
    audio: (
      <React.Fragment>
        <div className="step-q">Add your audio.</div>
        <div className="drop-zones">
          <div className={`drop-zone${audioFile?' loaded':''}${audioDrag?' drag':''}`}
            onClick={()=>audioRef.current?.click()}
            onDragOver={e=>{e.preventDefault();setAudioDrag(true);}}
            onDragLeave={()=>setAudioDrag(false)}
            onDrop={e=>{e.preventDefault();setAudioDrag(false);handleAudio(e.dataTransfer.files[0]);}}>
            <input ref={audioRef} type="file" accept="audio/*" style={{display:'none'}} onChange={e=>handleAudio(e.target.files[0])} />
            <div className="drop-icon">{audioFile?'✓':'↑'}</div>
            <div className="drop-primary">{audioFile ? audioFile.name : 'Drop audio here'}</div>
            <div className="drop-secondary">{audioFile ? 'Audio ready' : 'MP3 · M4A · WAV'}</div>
          </div>
          <div className={`drop-zone${srtFile?' loaded':''}${srtDrag?' drag':''}`}
            onClick={()=>srtRef.current?.click()}
            onDragOver={e=>{e.preventDefault();setSrtDrag(true);}}
            onDragLeave={()=>setSrtDrag(false)}
            onDrop={async e=>{e.preventDefault();setSrtDrag(false);handleSrt(e.dataTransfer.files[0]);}}>
            <input ref={srtRef} type="file" accept=".srt,.txt" style={{display:'none'}} onChange={e=>handleSrt(e.target.files[0])} />
            <div className="drop-icon">{srtFile?'✓':'↑'}</div>
            <div className="drop-primary">{srtFile ? srtFile.name : 'Drop captions here'}</div>
            <div className="drop-secondary">{srtFile ? `${srtText.split(/\n\s*\n/).filter(Boolean).length} caption blocks` : 'SRT file · optional'}</div>
          </div>
        </div>
        <p className="audio-note">You can also upload audio and captions directly inside the studio.</p>
        <div className="nav">
          <button className="back-btn" onClick={back}>← Back</button>
          <button className="next-btn" onClick={next}>Continue →</button>
        </div>
      </React.Fragment>
    ),
    ready: (
      <React.Fragment>
        <div className="step-q">Ready.</div>
        <div className="summary">
          <div className="sum-row"><div className="sum-key">Format</div><div className="sum-val">{format==='audiogram'?'Audiogram':'Static Post'}</div></div>
          <div className="sum-row"><div className="sum-key">Episode</div><div className="sum-val">{ep?`S1 · E${ep.e} — ${ep.title}`:'General post'}{ep&&<div className="sum-note">Eyebrow, heading, and outro auto-filled</div>}</div></div>
          <div className="sum-row"><div className="sum-key">Background</div><div className="sum-val">{bgType==='pattern'?(COLORWAYS.find(c=>c.key===bgChoice)?.name||'Night Blue')+' pattern':'Episode illustration'}</div></div>
          {format==='static'&&<div className="sum-row"><div className="sum-key">Build</div><div className="sum-val">{postType==='episode'?'5-post episode carousel':postType==='quote'?'Quote post':(LAYOUTS.find(l=>l.key===layout)?.name||'Static post')}{postType==='episode'&&<div className="sum-note">Cover · Synopsis · Synopsis · Credits · Now Streaming</div>}</div></div>}
          {format==='audiogram'&&<div className="sum-row"><div className="sum-key">Audio</div><div className="sum-val">{audioFile?audioFile.name:'—'}{!audioFile&&<div className="sum-note">Upload in the studio sidebar</div>}</div></div>}
          {format==='audiogram'&&srtText&&<div className="sum-row"><div className="sum-key">Captions</div><div className="sum-val">{srtText.split(/\n\s*\n/).filter(Boolean).length} caption blocks loaded</div></div>}
        </div>
        <button className="launch-btn" onClick={launch}>Open Studio →</button>
        <div className="nav" style={{marginTop:24}}><button className="back-btn" onClick={back}>← Back</button><span/></div>
      </React.Fragment>
    ),
  };

  return (
    <React.Fragment>
      <div className="progress-bar" style={{width:`${progress}%`}}/>
      <div className="header">
        <a href={OVERVIEW} className="logo-link" title="Back to overview"><img src={`${LOGOS}logo-horizontal-oak.svg`} className="logo" alt="More Muslim"/></a>
        <a href={STUDIO} className="skip-link">Skip setup →</a>
      </div>
      <div className="step" key={cur}>{stepContent[cur]}</div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Wizard/>);
</script>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
    <rect width="120" height="80" fill="rgba(246,225,198,0.4)"/>
    <rect x="12" y="12" width="44" height="56" rx="0" fill="#511C14" opacity="0.08"/>
    <rect x="64" y="12" width="44" height="26" rx="0" fill="#511C14" opacity="0.08"/>
    <rect x="64" y="42" width="44" height="26" rx="0" fill="#511C14" opacity="0.08"/>
    <rect x="12" y="72" width="96" height="1.5" fill="#511C14" opacity="0.2"/>
  </svg>
</template>
</body>
</html>
